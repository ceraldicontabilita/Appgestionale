<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, maximum-scale=1.0, user-scalable=no">
<meta name="theme-color" content="#1E1B4B">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="mobile-web-app-capable" content="yes">
<title>Ceraldi - Gestionale Mobile</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<style>
:root{--primary:#5D29C7;--primary-soft:#EFE7FF;--bg:#F0F4FA;--card:#FFFFFF;--sidebar:#1E1B4B;--success:#00B884;--success-soft:#D4F5EA;--warning:#FF9800;--warning-soft:#FFE9CC;--danger:#F44336;--danger-soft:#FFDAD7;--info:#2196F3;--info-soft:#D7EBFB;--text:#0F172A;--text-2:#64748B;--border:#E2E8F0;--safe-top:env(safe-area-inset-top,0px);--safe-bot:env(safe-area-inset-bottom,0px)}
*{box-sizing:border-box;-webkit-tap-highlight-color:transparent}
html,body{margin:0;padding:0;height:100%;overscroll-behavior-y:none}
body{font-family:'Plus Jakarta Sans',-apple-system,system-ui,sans-serif;font-size:16px;color:var(--text);background:var(--bg);-webkit-font-smoothing:antialiased;text-size-adjust:100%;-webkit-text-size-adjust:100%}
button,input,select,textarea{font-family:inherit;font-size:inherit;color:inherit}
.app{display:flex;flex-direction:column;min-height:100vh;min-height:100dvh}
.topbar{position:sticky;top:0;z-index:40;background:var(--sidebar);color:#fff;padding:calc(12px + var(--safe-top)) 14px 12px;display:flex;align-items:center;gap:10px;box-shadow:0 2px 10px rgba(30,27,75,.15)}
.topbar .menu-btn,.icon-btn{width:44px;height:44px;border-radius:12px;border:none;background:rgba(255,255,255,.1);color:#fff;display:grid;place-items:center;cursor:pointer;transition:background .15s}
.topbar .menu-btn:active,.icon-btn:active{background:rgba(255,255,255,.2)}
.topbar .title-wrap{flex:1;min-width:0}
.topbar .title{font-weight:700;font-size:17px;letter-spacing:-.01em;line-height:1.1;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.topbar .title-sub{font-weight:500;opacity:.65;font-size:12px;margin-top:3px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.topbar .actions{display:flex;gap:6px;flex-shrink:0}
main{flex:1;padding:14px 14px calc(30px + var(--safe-bot));max-width:720px;margin:0 auto;width:100%}
.drawer-overlay{position:fixed;inset:0;background:rgba(15,23,42,.5);z-index:90;opacity:0;pointer-events:none;transition:opacity .2s}
.drawer-overlay.show{opacity:1;pointer-events:auto}
.drawer{position:fixed;top:0;left:0;bottom:0;width:84%;max-width:340px;background:var(--sidebar);color:#fff;z-index:91;transform:translateX(-100%);transition:transform .25s cubic-bezier(.4,0,.2,1);display:flex;flex-direction:column;padding:calc(24px + var(--safe-top)) 0 calc(16px + var(--safe-bot))}
.drawer.show{transform:translateX(0)}
.drawer-head{padding:0 20px 20px;border-bottom:1px solid rgba(255,255,255,.08);display:flex;align-items:center;gap:12px}
.drawer-head .logo{width:44px;height:44px;border-radius:12px;background:linear-gradient(135deg,#8B5CF6 0%,#5D29C7 100%);display:grid;place-items:center;font-weight:800;font-size:18px}
.drawer-head h2{margin:0;font-size:16px;font-weight:700}
.drawer-head .sub{opacity:.6;font-size:11px;margin-top:2px}
.drawer-nav{flex:1;overflow-y:auto;padding:8px}
.drawer-item{display:flex;align-items:center;gap:14px;padding:14px 16px;border-radius:12px;color:rgba(255,255,255,.8);font-weight:600;font-size:15px;cursor:pointer;border:none;background:none;width:100%;text-align:left;margin-bottom:2px;transition:background .15s,color .15s;min-height:48px}
.drawer-item:active{background:rgba(255,255,255,.08)}
.drawer-item.active{background:rgba(255,255,255,.12);color:#fff}
.drawer-item span.em{font-size:22px;flex-shrink:0;width:26px;text-align:center}
.drawer-section{padding:10px 18px 4px;font-size:10px;text-transform:uppercase;letter-spacing:.1em;color:rgba(255,255,255,.42);font-weight:700;margin-top:6px}
.drawer-foot{padding:10px 20px;border-top:1px solid rgba(255,255,255,.08);font-size:11px;color:rgba(255,255,255,.4);text-align:center}
.card{background:var(--card);border-radius:16px;padding:16px;box-shadow:0 2px 10px rgba(93,41,199,.06);margin-bottom:12px}
.card h3{margin:0 0 10px;font-size:15px;font-weight:700}
.muted{color:var(--text-2);font-size:13px}
.stats{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:14px}
.stats.three{grid-template-columns:1fr 1fr 1fr}
.stats.one{grid-template-columns:1fr}
.stat{background:var(--card);border-radius:16px;padding:14px;box-shadow:0 2px 10px rgba(93,41,199,.06)}
.stat .label{font-size:10px;color:var(--text-2);font-weight:700;text-transform:uppercase;letter-spacing:.06em}
.stat .value{font-size:22px;font-weight:800;margin-top:6px;letter-spacing:-.02em;line-height:1}
.stat .sub{font-size:11px;color:var(--text-2);margin-top:4px}
.stat.accent{background:linear-gradient(135deg,#5D29C7 0%,#7B3FF2 100%);color:#fff}
.stat.accent .label,.stat.accent .sub{color:rgba(255,255,255,.85)}
.stat.success{background:linear-gradient(135deg,#00B884 0%,#00D69A 100%);color:#fff}
.stat.success .label,.stat.success .sub{color:rgba(255,255,255,.85)}
.stat.danger{background:linear-gradient(135deg,#F44336 0%,#FF5E50 100%);color:#fff}
.stat.danger .label,.stat.danger .sub{color:rgba(255,255,255,.85)}
.stat.warning{background:linear-gradient(135deg,#FF9800 0%,#FFB74D 100%);color:#fff}
.stat.warning .label,.stat.warning .sub{color:rgba(255,255,255,.85)}
.badge{display:inline-flex;align-items:center;padding:3px 10px;border-radius:20px;font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:.04em}
.badge.success{background:var(--success-soft);color:#006B4F}
.badge.warning{background:var(--warning-soft);color:#8B4900}
.badge.danger{background:var(--danger-soft);color:#8B1A12}
.badge.info{background:var(--info-soft);color:#0D4E8A}
.badge.neutral{background:#E2E8F0;color:#475569}
.badge.primary{background:var(--primary-soft);color:var(--primary)}
.list-item{background:var(--card);border-radius:14px;padding:14px;margin-bottom:8px;cursor:pointer;box-shadow:0 1px 6px rgba(93,41,199,.05);transition:transform .1s;min-height:60px}
.list-item:active{transform:scale(.98)}
.list-item .li-top{display:flex;justify-content:space-between;align-items:flex-start;gap:10px;margin-bottom:4px}
.list-item .li-title{font-weight:700;font-size:15px;line-height:1.3;flex:1;min-width:0;overflow:hidden}
.list-item .li-title .small{font-weight:500;color:var(--text-2);font-size:13px;display:block;margin-top:3px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.list-item .li-amount{font-weight:800;font-size:16px;white-space:nowrap;letter-spacing:-.01em}
.list-item .li-amount.positive{color:var(--success)}
.list-item .li-amount.negative{color:var(--danger)}
.list-item .li-bottom{display:flex;justify-content:space-between;align-items:center;gap:8px;margin-top:8px;flex-wrap:wrap}
.list-item .li-meta{font-size:12px;color:var(--text-2)}
.btn{display:inline-flex;align-items:center;justify-content:center;gap:6px;padding:11px 16px;border-radius:12px;border:none;font-weight:700;font-size:14px;cursor:pointer;transition:transform .1s,opacity .15s}
.btn:active{transform:scale(.97)}
.btn:disabled{opacity:.5;cursor:not-allowed}
.btn-primary{background:linear-gradient(135deg,#5D29C7 0%,#7B3FF2 100%);color:#fff;box-shadow:0 4px 12px rgba(93,41,199,.25)}
.btn-ghost{background:#F1F5F9;color:var(--text)}
.btn-success{background:var(--success);color:#fff}
.btn-warning{background:var(--warning);color:#fff}
.btn-danger{background:var(--danger);color:#fff}
.btn-block{width:100%}
.btn-sm{padding:8px 12px;font-size:12px}
.fab{position:fixed;bottom:calc(20px + var(--safe-bot));right:16px;width:56px;height:56px;border-radius:50%;background:linear-gradient(135deg,#5D29C7 0%,#7B3FF2 100%);color:#fff;border:none;box-shadow:0 8px 24px rgba(93,41,199,.4);display:grid;place-items:center;cursor:pointer;z-index:30;transition:transform .1s}
.fab:active{transform:scale(.92)}
.field{margin-bottom:12px}
.field label{display:block;font-size:11px;font-weight:700;color:var(--text-2);margin-bottom:5px;text-transform:uppercase;letter-spacing:.04em}
.input,.select,.textarea{width:100%;padding:11px 14px;border:1.5px solid var(--border);border-radius:12px;background:#fff;font-size:15px;outline:none;transition:border-color .15s,box-shadow .15s;font-family:inherit}
.textarea{resize:vertical;min-height:80px}
.input:focus,.select:focus,.textarea:focus{border-color:var(--primary);box-shadow:0 0 0 3px rgba(93,41,199,.1)}
.field-row{display:flex;gap:10px}
.field-row .field{flex:1}
.search-bar{display:flex;align-items:center;gap:8px;background:#fff;border-radius:14px;padding:9px 14px;margin-bottom:10px;box-shadow:0 1px 6px rgba(93,41,199,.05)}
.search-bar input{flex:1;border:none;outline:none;font-size:14px;background:none}
.search-bar svg{color:var(--text-2);flex-shrink:0}
.chips{display:flex;gap:8px;overflow-x:auto;padding:2px 14px 12px;scrollbar-width:none;margin:0 -14px}
.chips::-webkit-scrollbar{display:none}
.chip{padding:10px 18px;border-radius:22px;background:#fff;border:1.5px solid var(--border);font-size:14px;font-weight:600;cursor:pointer;white-space:nowrap;flex-shrink:0;color:var(--text-2);transition:all .15s;min-height:40px;display:inline-flex;align-items:center}
.chip.active{background:var(--primary);border-color:var(--primary);color:#fff}
.sheet-overlay{position:fixed;inset:0;background:rgba(15,23,42,.5);z-index:100;opacity:0;pointer-events:none;transition:opacity .2s;display:flex;align-items:flex-end}
.sheet-overlay.show{opacity:1;pointer-events:auto}
.sheet{background:#fff;width:100%;max-width:720px;margin:0 auto;border-radius:20px 20px 0 0;padding:8px 16px calc(24px + var(--safe-bot));max-height:92vh;overflow-y:auto;transform:translateY(100%);transition:transform .25s cubic-bezier(.4,0,.2,1);box-shadow:0 -4px 30px rgba(30,27,75,.2)}
.sheet-overlay.show .sheet{transform:translateY(0)}
.sheet-handle{width:40px;height:4px;background:#CBD5E1;border-radius:4px;margin:4px auto 12px}
.sheet h2{margin:0 0 14px;font-size:18px;font-weight:800;letter-spacing:-.02em}
.sheet .kv{display:flex;justify-content:space-between;gap:10px;padding:7px 0;border-bottom:1px solid var(--border);font-size:14px}
.sheet .kv:last-of-type{border:none}
.sheet .kv .k{color:var(--text-2);font-size:12px}
.sheet .kv .v{font-weight:600;text-align:right;word-break:break-word}
.pin-wrap{position:fixed;inset:0;z-index:300;background:linear-gradient(160deg,#1E1B4B 0%,#5D29C7 65%,#7B3FF2 100%);color:#fff;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:calc(20px + var(--safe-top)) 20px calc(20px + var(--safe-bot));gap:24px;overflow-y:auto}
.pin-head{display:flex;flex-direction:column;align-items:center;gap:12px}
.pin-head .logo{width:76px;height:76px;border-radius:22px;background:linear-gradient(135deg,#fff 0%,#EFE7FF 100%);display:grid;place-items:center;color:var(--primary);font-weight:800;font-size:34px;box-shadow:0 10px 30px rgba(0,0,0,.25)}
.pin-head h1{margin:0;font-size:24px;font-weight:800;letter-spacing:-.02em;text-align:center}
.pin-head .pin-sub{opacity:.75;font-size:14px;text-align:center}
.pin-center{display:flex;flex-direction:column;align-items:center;gap:8px;width:100%}
.pin-dots{display:flex;gap:16px;margin:10px 0 8px}
.pin-dot{width:18px;height:18px;border-radius:50%;border:2px solid rgba(255,255,255,.6);transition:all .15s}
.pin-dot.filled{background:#fff;border-color:#fff;transform:scale(1.1)}
.pin-dot.err{background:var(--danger);border-color:var(--danger)}
.pin-shake{animation:shake .4s}
@keyframes shake{0%,100%{transform:translateX(0)}20%{transform:translateX(-10px)}40%{transform:translateX(10px)}60%{transform:translateX(-8px)}80%{transform:translateX(8px)}}
.pin-msg{min-height:24px;font-size:14px;font-weight:600;opacity:.85;text-align:center;padding:0 10px}
.pin-msg.err{color:#FFD4D0}
.pin-msg.ok{color:#C6F5E4}
.pin-pad{display:grid;grid-template-columns:repeat(3,1fr);gap:16px;max-width:320px;width:100%;padding:0 4px}
.pin-key{width:100%;aspect-ratio:1;max-width:84px;max-height:84px;border-radius:50%;background:rgba(255,255,255,.15);color:#fff;border:none;font-size:30px;font-weight:500;cursor:pointer;display:grid;place-items:center;justify-self:center;transition:transform .1s,background .15s;font-family:inherit}
.pin-key:active{background:rgba(255,255,255,.35);transform:scale(.94)}
.pin-key.ghost{background:transparent;cursor:default}
.pin-key:disabled{opacity:.35;cursor:not-allowed}
.pin-foot{color:rgba(255,255,255,.5);font-size:12px;text-align:center}
.toast{position:fixed;left:50%;transform:translateX(-50%) translateY(200%);bottom:calc(30px + var(--safe-bot));z-index:400;background:#0F172A;color:#fff;padding:12px 20px;border-radius:14px;font-size:13px;font-weight:600;box-shadow:0 8px 24px rgba(0,0,0,.25);transition:transform .3s cubic-bezier(.4,0,.2,1);max-width:92%;text-align:center}
.toast.show{transform:translateX(-50%) translateY(0)}
.toast.success{background:var(--success)}
.toast.error{background:var(--danger)}
.hidden{display:none!important}
.empty{text-align:center;padding:40px 20px;color:var(--text-2)}
.empty .icon{font-size:40px;margin-bottom:10px;opacity:.5}
.empty .title{font-weight:700;margin-bottom:4px;color:var(--text)}
.loading{text-align:center;padding:30px;color:var(--text-2);font-size:13px}
.spinner{display:inline-block;width:20px;height:20px;border:2.5px solid var(--border);border-top-color:var(--primary);border-radius:50%;animation:spin .7s linear infinite;vertical-align:middle;margin-right:8px}
@keyframes spin{to{transform:rotate(360deg)}}
.section-title{font-size:11px;font-weight:700;color:var(--text-2);text-transform:uppercase;letter-spacing:.08em;margin:14px 4px 8px;display:flex;justify-content:space-between;align-items:center}
.section-title .link{color:var(--primary);font-weight:600;text-transform:none;letter-spacing:0;cursor:pointer;font-size:12px}
.tabs{display:flex;background:#fff;border-radius:12px;padding:4px;margin-bottom:12px;box-shadow:0 1px 6px rgba(93,41,199,.05)}
.tab{flex:1;padding:9px;border-radius:9px;font-weight:700;font-size:13px;text-align:center;background:none;border:none;color:var(--text-2);cursor:pointer}
.tab.active{background:var(--primary);color:#fff}
.alert-row{display:flex;align-items:flex-start;gap:12px;padding:12px;border-radius:12px;margin-bottom:8px;background:var(--warning-soft)}
.alert-row.danger{background:var(--danger-soft)}
.alert-row.info{background:var(--info-soft)}
.alert-row.success{background:var(--success-soft)}
.alert-row .a-icon{font-size:20px;flex-shrink:0}
.alert-row .a-body{flex:1;min-width:0}
.alert-row .a-title{font-weight:700;font-size:13px;line-height:1.35}
.alert-row .a-sub{font-size:11px;color:var(--text-2);margin-top:2px;line-height:1.4}
.kv-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:12px}
.kv-box{background:#F1F5F9;border-radius:10px;padding:10px}
.kv-box .k{font-size:10px;color:var(--text-2);text-transform:uppercase;font-weight:700;letter-spacing:.06em}
.kv-box .v{font-size:16px;font-weight:800;margin-top:4px}
.month-selector{display:flex;gap:6px;overflow-x:auto;padding:4px 14px 12px;margin:0 -14px;scrollbar-width:none}
.month-selector::-webkit-scrollbar{display:none}
.month-selector .m{padding:10px 16px;border-radius:10px;background:#fff;border:1px solid var(--border);font-size:14px;font-weight:600;cursor:pointer;white-space:nowrap;flex-shrink:0;color:var(--text-2);min-height:40px}
.month-selector .m.active{background:var(--primary);color:#fff;border-color:var(--primary)}
</style>
</head>
<body>

<div id="pinScreen" class="pin-wrap">
  <div class="pin-head">
    <div class="logo">C</div>
    <h1>Ceraldi Gestionale</h1>
    <div class="pin-sub">Inserisci il PIN</div>
  </div>
  <div class="pin-center">
    <div id="pinDots" class="pin-dots"><div class="pin-dot"></div><div class="pin-dot"></div><div class="pin-dot"></div><div class="pin-dot"></div><div class="pin-dot"></div><div class="pin-dot"></div></div>
    <div id="pinMsg" class="pin-msg"></div>
    <div id="pinPad" class="pin-pad">
      <button class="pin-key" data-k="1">1</button><button class="pin-key" data-k="2">2</button><button class="pin-key" data-k="3">3</button>
      <button class="pin-key" data-k="4">4</button><button class="pin-key" data-k="5">5</button><button class="pin-key" data-k="6">6</button>
      <button class="pin-key" data-k="7">7</button><button class="pin-key" data-k="8">8</button><button class="pin-key" data-k="9">9</button>
      <button class="pin-key ghost" disabled></button><button class="pin-key" data-k="0">0</button><button class="pin-key" data-k="DEL">&#9003;</button>
    </div>
  </div>
  <div class="pin-foot">v6.0 - Mobile Suite</div>
</div>

<div id="drawerOverlay" class="drawer-overlay" onclick="closeDrawer()"></div>
<nav id="drawer" class="drawer">
  <div class="drawer-head">
    <div class="logo">C</div>
    <div><h2>Ceraldi</h2><div class="sub">Gestionale Mobile v4.0</div></div>
  </div>
  <div class="drawer-nav" id="drawerNav"></div>
  <div class="drawer-foot">impresasemplice.online</div>
</nav>

<div id="app" class="app hidden">
  <header class="topbar">
    <button class="menu-btn" onclick="openDrawer()"><svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round"><line x1="3" y1="12" x2="21" y2="12"/><line x1="3" y1="6" x2="21" y2="6"/><line x1="3" y1="18" x2="21" y2="18"/></svg></button>
    <div class="title-wrap">
      <div class="title" id="topTitle">Dashboard</div>
      <div class="title-sub" id="topSub">Anno 2026</div>
    </div>
    <div class="actions">
      <button class="icon-btn" onclick="reloadModule()"><svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><path d="M3 12a9 9 0 0 1 15.5-6.36L21 8"/><path d="M21 3v5h-5"/><path d="M21 12a9 9 0 0 1-15.5 6.36L3 16"/><path d="M3 21v-5h5"/></svg></button>
      <button class="icon-btn" onclick="apriImpostazioni()"><svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 1 1-2.83 2.83l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-4 0v-.09a1.65 1.65 0 0 0-1-1.51 1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 1 1-2.83-2.83l.06-.06a1.65 1.65 0 0 0 .33-1.82 1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1 0-4h.09a1.65 1.65 0 0 0 1.51-1 1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 1 1 2.83-2.83l.06.06a1.65 1.65 0 0 0 1.82.33h0a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 4 0v.09a1.65 1.65 0 0 0 1 1.51h0a1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 1 1 2.83 2.83l-.06.06a1.65 1.65 0 0 0-.33 1.82v0a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 0 4h-.09a1.65 1.65 0 0 0-1.51 1z"/></svg></button>
      <button class="icon-btn" onclick="lockApp()"><svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round"><rect x="3" y="11" width="18" height="11" rx="2"/><path d="M7 11V7a5 5 0 0 1 10 0v4"/></svg></button>
    </div>
  </header>
  <main id="main"></main>
  <button id="fab" class="fab hidden" onclick="onFab()"><svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg></button>
</div>

<div id="sheetOverlay" class="sheet-overlay" onclick="if(event.target===this)closeSheet()">
  <div class="sheet" onclick="event.stopPropagation()">
    <div class="sheet-handle"></div>
    <div id="sheetBody"></div>
  </div>
</div>

async function aiCallVision(base64, mediaType, prompt, maxTokens=2048){
  if(!getAIKey()){ throw new Error('API key Anthropic mancante - configurala nelle Impostazioni'); }
  const isPDF = mediaType==='application/pdf';
  const content = [
    isPDF ? {type:'document', source:{type:'base64', media_type:mediaType, data:base64}} 
          : {type:'image',    source:{type:'base64', media_type:mediaType, data:base64}},
    {type:'text', text:prompt}
  ];
  const res = await fetch('https://api.anthropic.com/v1/messages', {
    method:'POST', headers: aiHeaders(),
    body: JSON.stringify({
      model:'claude-sonnet-4-5', max_tokens:maxTokens,
      messages:[
        {role:'user', content},
        {role:'assistant', content:'{'}
      ]
    })
  });
  const d = await res.json();
  if(d.error) throw new Error(d.error.message||'Errore API');
  const txt = '{' + ((d.content||[]).map(b=>b.text||'').join('').replace(/```json|```/g,'').trim());
  try { return JSON.parse(txt); } catch(e){ throw new Error('JSON non valido: '+txt.slice(0,100)); }
}

// Cache correzioni OCR caricate dal server. Aggiornata a ogni login e dopo ogni invio.
let _ocrCorrezioni = [];
// Ultima lettura grezza fatta da Claude (per calcolare diff utente dopo salvataggio)
let _aiLastRead = null;
// Foto scattata durante scan AI (per allegarla alla fattura dopo la creazione)

async function caricaCorrezioniOCR(){
  try{
    const r = await api('/api/ocr-fatture/correzioni?limit=200');
    _ocrCorrezioni = Array.isArray(r) ? r : (r.items || []);
  }catch(e){ _ocrCorrezioni = []; }  // endpoint ancora non deployato? nessun problema, funziona lo stesso
}

function buildPromptFattura(fornitoreHint){
  // Se non ci sono correzioni, usa prompt base (comportamento pre-apprendimento)
  if(!_ocrCorrezioni || !_ocrCorrezioni.length) return PROMPT_FATTURA_BASE;

  // Raggruppa per campo, preferendo correzioni dello stesso fornitore se noto
  const normForn = s => String(s||'').toLowerCase().replace(/[.,]/g,'').trim().replace(/\s+/g,' ');
  const fornKey = normForn(fornitoreHint||'');
  const perCampo = {};
  for(const c of _ocrCorrezioni){
    if(!c.campo || !c.sbagliato || !c.corretto) continue;
    perCampo[c.campo] = perCampo[c.campo] || [];
    perCampo[c.campo].push(c);
  }
  // Ordina dando priorità al fornitore corrente, poi ts decrescente
  for(const k of Object.keys(perCampo)){
    perCampo[k].sort((a,b)=>{
      const aMatch = fornKey && a.fornitore_norm===fornKey ? 0 : 1;
      const bMatch = fornKey && b.fornitore_norm===fornKey ? 0 : 1;
      if(aMatch!==bMatch) return aMatch-bMatch;
      return (b.ts_epoch||0) - (a.ts_epoch||0);
    });
    perCampo[k] = perCampo[k].slice(0, 5);  // max 5 esempi per campo (contiene il prompt)
  }
  const keys = Object.keys(perCampo);
  if(!keys.length) return PROMPT_FATTURA_BASE;

  let add = '\n\n═══ CORREZIONI APPRESE ═══\nApplica OBBLIGATORIAMENTE queste regole basate su correzioni precedenti dell\'utente:';
  for(const campo of keys){
    for(const c of perCampo[campo]){
      const ctx = c.fornitore ? ` (fornitore "${c.fornitore}")` : '';
      add += `\n- campo "${campo}"${ctx}: se leggi qualcosa simile a "${c.sbagliato}", usa "${c.corretto}"`;
    }
  }
  add += '\n\nATTENZIONE: applica le regole sopra anche se il documento mostra una variante leggermente diversa.';
  return PROMPT_FATTURA_BASE + add;
}

        user_final: userFinal,
        fornitore_context: userFinal.fornitore || aiRead.fornitore || '',

      }),
    });
    if(r && r.correzioni_registrate > 0){
      // Aggiorna cache locale così la prossima scansione ne beneficia subito

    // Silenzioso: se l'endpoint non è ancora deployato l'app continua a funzionare
    console.warn('[OCR] inviaCorrezioneOCR:', e.message);
  }
}

function fileToBase64(file){
  return new Promise((resolve,reject)=>{
    const r=new FileReader();
    r.onload=()=>resolve({base64:r.result.split(',')[1], mediaType:file.type});
    r.onerror=()=>reject(new Error('Lettura file fallita'));
    r.readAsDataURL(file);
  });
}

async function api(path, opts={}){
  const url = API_BASE.replace(/\/$/,'') + path;
  const headers = {'Content-Type':'application/json',...(opts.headers||{})};
  if(TOKEN) headers['Authorization']='Bearer '+TOKEN;
  const res = await fetch(url,{...opts,headers});
  if(!res.ok){let msg=`HTTP ${res.status}`;try{const j=await res.json();msg=j.detail||j.message||msg;}catch{}throw new Error(msg);}
  if(res.status===204) return null;
  const ct = res.headers.get('content-type')||'';
  if(ct.includes('json')) return res.json();
  return res.text();
}

function renderDots(){$('pinDots').querySelectorAll('.pin-dot').forEach((d,i)=>{d.classList.remove('err');d.classList.toggle('filled',i<pinBuffer.length);});}
function pinError(msg){const dots=$('pinDots');dots.classList.add('pin-shake');dots.querySelectorAll('.pin-dot').forEach(d=>d.classList.add('err'));const m=$('pinMsg');m.textContent=msg;m.className='pin-msg err';haptic([60,40,60]);setTimeout(()=>{dots.classList.remove('pin-shake');pinBuffer='';renderDots();m.textContent='';m.className='pin-msg';},900);}
function isLocked(){const u=parseInt(localStorage.getItem(LS.lockUntil)||'0');return u>Date.now()?u:0;}
function setLockTimer(){const u=isLocked();if(!u){enablePinPad(true);return;}enablePinPad(false);const s=Math.ceil((u-Date.now())/1000);$('pinMsg').innerHTML=`Bloccato - ${s}s`;$('pinMsg').className='pin-msg err';if(s>0)setTimeout(setLockTimer,1000);else{localStorage.removeItem(LS.lockUntil);localStorage.removeItem(LS.attempts);enablePinPad(true);$('pinMsg').textContent='';}}
function enablePinPad(on){$('pinPad').querySelectorAll('.pin-key').forEach(b=>{if(!b.classList.contains('ghost'))b.disabled=!on;});}
async function onPinKey(k){
  if(isLocked())return;haptic(10);
  if(k==='DEL'){pinBuffer=pinBuffer.slice(0,-1);renderDots();return;}
  if(pinBuffer.length>=6)return;
  pinBuffer+=k;renderDots();
  if(pinBuffer.length===6){
    const h = await sha256(pinBuffer);
    if(h===PIN_HASH){
      localStorage.removeItem(LS.attempts);localStorage.removeItem(LS.lockUntil);
      $('pinMsg').textContent='Verifica server...';$('pinMsg').className='pin-msg';
      // FIX CRITICO: il PIN è valido localmente, ora chiediamo al backend
      // un JWT vero chiamando /api/auth/pin-login. Senza questo TOKEN resta vuoto
      // e tutte le API successive danno 401 "Authentication required".
      const pinPlaintext = pinBuffer;  // salva prima che venga resettato
      try{
        const url = API_BASE.replace(/\/$/,'') + '/api/auth/pin-login';
        const res = await fetch(url, {
          method: 'POST',
          headers: {'Content-Type':'application/json'},
          body: JSON.stringify({pin: pinPlaintext})
        });
        if(!res.ok){
          const err = await res.text();
          throw new Error(`HTTP ${res.status}: ${err.slice(0,200)}`);
        }
        const data = await res.json();
        if(!data.access_token) throw new Error('Server non ha restituito access_token');
        TOKEN = data.access_token;
        localStorage.setItem(LS.token, TOKEN);
        $('pinMsg').textContent='Accesso ok';$('pinMsg').className='pin-msg ok';haptic(20);
        setTimeout(()=>{$('pinScreen').classList.add('hidden');showApp();},200);
      }catch(e){
        $('pinMsg').textContent='Server: '+e.message.slice(0,60);
        $('pinMsg').className='pin-msg err';
        setTimeout(()=>{pinBuffer='';renderDots();$('pinMsg').textContent='';$('pinMsg').className='pin-msg';},3500);
      }
    }else{
      let a=parseInt(localStorage.getItem(LS.attempts)||'0')+1;localStorage.setItem(LS.attempts,String(a));
      if(a>=5){localStorage.setItem(LS.lockUntil,String(Date.now()+30000));pinError(`Troppi tentativi`);setTimeout(setLockTimer,500);}
      else pinError(`PIN errato (${a}/5)`);
    }
  }
}

const RICORRENTI_KEYWORDS = [

function fornitoreEricorrente(nome){
  if(!nome) return false;
  const up = String(nome).toUpperCase();
  return RICORRENTI_KEYWORDS.some(kw => up.includes(kw));
}
function categoriaRicorrente(nome){
  if(!nome) return 'Altro';
  const up = String(nome).toUpperCase();
  if(['ENEL','ENI','PLENITUDE','A2A','ACEA','HERA','IREN','EDISON','SORGENIA','2I RETE'].some(k=>up.includes(k))) return 'Energia';
  if(['ABC -','ABC ACQUA','ACQUEDOTTO','ACQUALATINA'].some(k=>up.includes(k))) return 'Acqua';
  if(['TIM','VODAFONE','WINDTRE','WIND TRE','FASTWEB','ILIAD','TELECOM','LINKEM','KENA','COOPVOCE','POSTE ITALIANE'].some(k=>up.includes(k))) return 'Telco';
  if(['GOOGLE CLOUD','MICROSOFT','AMAZON WEB','AWS','MADBIT','TSPAY','DROPBOX','SLACK','ZOOM','NOTION'].some(k=>up.includes(k))) return 'Software/SaaS';
  if(['SKY','MEDIASET','RAI','NETFLIX','SPOTIFY'].some(k=>up.includes(k))) return 'Media/TV';
  if(['PAGOPA','SIAE'].some(k=>up.includes(k))) return 'Tributi/Diritti';
  return 'Altro';
}

async function salvaFatturaAI(){
  const body = {
    tipo_documento: $('fTipoDoc').value,
    fornitore_denominazione: $('fForn').value.trim(),
    cedente_denominazione: $('fForn').value.trim(),
    partita_iva: $('fPiva')?.value.trim(),
    cedente_piva: $('fPiva')?.value.trim(),
    numero_fattura: $('fNum').value.trim(),
    data_fattura: $('fData').value,
    data_scadenza: $('fScad').value||null,
    importo_totale: parseFloat($('fImp').value)||0,
    totale: parseFloat($('fImp').value)||0,
    metodo_pagamento: $('fPag').value||null,
    iban: $('fIban')?.value.trim()||null,
    origine: 'mobile_ai_scan'
  };
  if(!body.fornitore_denominazione) return toast('Fornitore obbligatorio','error');
  if(!body.numero_fattura) return toast('Numero obbligatorio','error');
  if(!body.data_fattura) return toast('Data obbligatoria','error');
  if(body.importo_totale<=0) return toast('Importo non valido','error');

  // Costruisci versione "user_final" con stessa struttura di ai_read (per diff)
  const userFinal = {
    tipo_documento: body.tipo_documento,
    fornitore: body.fornitore_denominazione,
    numero_fattura: body.numero_fattura,
    data: body.data_fattura,
    data_scadenza: body.data_scadenza || '',
    importo: body.importo_totale,
    pagamento: body.metodo_pagamento || '',
    iban: body.iban || '',
    partita_iva: body.partita_iva || '',
  };

  let createdId = null;
  try{
    // Prova endpoint paga-manuale (se la fattura è già pagata) o crea manuale
    const r = await api('/api/fatture-ricevute/paga-manuale',{method:'POST',body:JSON.stringify(body)});
    createdId = r?.id || r?.invoice_id || r?.invoice_key || null;
    toast('Fattura salvata','success');haptic(30);closeSheet();
    if(currentModule==='fatture') reloadModule();
  }catch(e){
    // Fallback generico
    try{
      const r = await api('/api/invoices',{method:'POST',body:JSON.stringify(body)});
      createdId = r?.id || r?.invoice_id || r?.invoice_key || null;
      toast('Fattura salvata','success');haptic(30);closeSheet();
      if(currentModule==='fatture') reloadModule();
    }catch(e2){ toast('Errore: '+e.message,'error'); return; }
  }

  // ═══ Azioni post-salvataggio (non bloccanti) ═══
  // 1. Registra correzioni OCR per apprendimento futuro
  if(_aiLastRead){
    inviaCorrezioneOCR(_aiLastRead, userFinal, createdId);
  }
  // 2. Allega la foto scattata alla fattura appena creata
  if(_aiLastFoto && createdId){
    allegaFotoABase64(createdId, _aiLastFoto.base64, _aiLastFoto.mediaType)
      .catch(err => console.warn('[FOTO] upload fallito:', err.message));
  }
  // Reset stato scansione
  _aiLastRead = null;
  _aiLastFoto = null;
}

// Carica una foto (dataURL/base64) come allegato di una fattura esistente.
// Il backend si aspetta multipart/form-data.
async function allegaFotoABase64(invoiceId, base64, mediaType){
  const binary = atob(base64);
  const bytes = new Uint8Array(binary.length);
  for(let i=0;i<binary.length;i++) bytes[i] = binary.charCodeAt(i);
  const blob = new Blob([bytes], {type: mediaType||'image/jpeg'});
  const fd = new FormData();
  fd.append('file', blob, 'fattura_scatto.jpg');

  const url = API_BASE.replace(/\/$/,'') + `/api/invoices/${encodeURIComponent(invoiceId)}/foto`;
  const headers = {};
  if(TOKEN) headers['Authorization'] = 'Bearer '+TOKEN;
  const res = await fetch(url, {method:'POST', headers, body: fd});
  if(!res.ok){
    const t = await res.text();
    throw new Error(`HTTP ${res.status}: ${t.slice(0,200)}`);
  }
  return res.json();
}

        <div class="kv-box"><div class="k">Fatture da riconciliare</div><div class="v">${statoR.fatture_da_riconciliare||statoR.invoices_pending||0}</div></div>
        <div class="kv-box"><div class="k">Movimenti aperti</div><div class="v">${statoR.movimenti_aperti||statoR.movements_pending||0}</div></div>
      </div>
    </div>` : ''}

    <div class="card">
      <h3>⚡ Azioni rapide</h3>
      <div style="display:grid;grid-template-columns:1fr 1fr;gap:8px">
        <button class="btn btn-ghost btn-sm" onclick="goModule('prima-nota-cassa')">💰 Cassa</button>
        <button class="btn btn-ghost btn-sm" onclick="goModule('prima-nota-banca')">🏦 Banca</button>
        <button class="btn btn-ghost btn-sm" onclick="goModule('provvisori')">⏳ Provvisori</button>
        <button class="btn btn-ghost btn-sm" onclick="goModule('scadenze')">📅 Scadenze</button>
        <button class="btn btn-ghost btn-sm" onclick="goModule('fatture')">📄 Fatture</button>
        <button class="btn btn-ghost btn-sm" onclick="goModule('assegni')">🧷 Assegni</button>
      </div>
    </div>

    ${lScad.length ? `
      <div class="section-title">Prossime scadenze <span class="link" onclick="goModule('scadenze')">Tutte</span></div>
      ${lScad.slice(0,5).map(s => {
        const gg = s.giorni_mancanti ?? Math.floor((new Date(s.data_scadenza||s.data) - new Date())/86400000);
        const cls = gg<0?'danger':(gg<7?'warning':'info');
        return `<div class="alert-row ${cls==='danger'?'danger':(cls==='warning'?'':'info')}">
          <div class="a-icon">${gg<0?'🚨':(gg<7?'⚠️':'📅')}</div>
          <div class="a-body">
            <div class="a-title">${escapeHtml(s.descrizione||s.tipo||'Scadenza')}</div>
            <div class="a-sub">${fmtDate(s.data_scadenza||s.data)} · ${gg<0?`scaduta ${Math.abs(gg)}gg fa`:`tra ${gg}gg`} · ${euro(s.importo||0)}</div>
          </div>
        </div>`;
      }).join('')}
    ` : ''}
  `;
}
</script><script>
// =================== COSTI RICORRENTI ===================
// Carica fatture dell'anno corrente + anno precedente, filtra per keyword utility/SaaS,
// raggruppa per categoria/fornitore, calcola spesa mensile e anomalie.
async function render_costi_ricorrenti(main){
  state.costRec = state.costRec || {view:'categorie', cat:null, forn:null, anno:ANNO};
  main.innerHTML = '<div class="loading"><span class="spinner"></span>Analizzo ' + ANNO + '...</div>';

  // Scarica fatture anno corrente e precedente (per confronto)
  const annoPrev = ANNO - 1;
  const [fatCur, fatPrev] = await Promise.all([
    api(`/api/invoices?anno=${ANNO}&limit=5000`).catch(()=>[]),
    api(`/api/invoices?anno=${annoPrev}&limit=5000`).catch(()=>[])
  ]);
  const allFat = [...(Array.isArray(fatCur)?fatCur:[]), ...(Array.isArray(fatPrev)?fatPrev:[])];

  // Filtra solo ricorrenti
  const ric = allFat.filter(f => fornitoreEricorrente(f.supplier_name || f.cedente_denominazione || ''));

  // Aggrega per categoria, per fornitore, per mese
  const byCat = {};   // cat -> {total:0, n:0, fornitori:{}}
  const byForn = {};  // forn -> {cat, total:0, n:0, fatture:[], mese2025:{1:0,...}, mese2026:{1:0,...}, mediaMensile}
  ric.forEach(f => {
    const nome = f.supplier_name || f.cedente_denominazione || '?';
    const cat = categoriaRicorrente(nome);
    const tot = Number(f.total_amount || f.importo_totale || 0);
    const data = f.invoice_date || f.data_fattura || '';
    const anno = String(data).slice(0,4);
    const mese = parseInt(String(data).slice(5,7)) || 0;

    if(!byCat[cat]) byCat[cat] = {total:0, n:0, fornitori:new Set(), curAnno:0};
    byCat[cat].n += 1;
    byCat[cat].total += tot;
    byCat[cat].fornitori.add(nome);
    if(anno === String(ANNO)) byCat[cat].curAnno += tot;

    if(!byForn[nome]) byForn[nome] = {cat, total:0, n:0, curAnno:0, prevAnno:0, fatture:[], perMese:{}};
    byForn[nome].n += 1;
    byForn[nome].total += tot;
    if(anno === String(ANNO)) byForn[nome].curAnno += tot;
    else if(anno === String(annoPrev)) byForn[nome].prevAnno += tot;
    byForn[nome].fatture.push(f);
    const key = `${anno}-${String(mese).padStart(2,'0')}`;
    byForn[nome].perMese[key] = (byForn[nome].perMese[key]||0) + tot;
  });

  // Calcola media mensile e anomalie per ogni fornitore
  Object.values(byForn).forEach(v => {
    const mesi = Object.values(v.perMese).filter(x=>x>0);
    v.mediaMensile = mesi.length ? (mesi.reduce((s,x)=>s+x,0) / mesi.length) : 0;
    // Ultima fattura (mese più recente)
    const keys = Object.keys(v.perMese).sort().reverse();
    v.ultimoMese = keys[0] || null;
    v.ultimoImporto = v.ultimoMese ? v.perMese[v.ultimoMese] : 0;
    // Anomalia: ultima bolletta >30% sopra la media
    v.anomalia = v.mediaMensile > 0 && v.ultimoImporto > v.mediaMensile * 1.3;
  });

  const totAnnoCorrente = Object.values(byForn).reduce((s,v)=>s+v.curAnno,0);
  const totAnnoPrec = Object.values(byForn).reduce((s,v)=>s+v.prevAnno,0);
  const mediaMensileTot = totAnnoCorrente / Math.max(1, new Date().getMonth()+1);  // Spalmato sui mesi trascorsi

  // ======= RENDER =======
  if(state.costRec.view === 'categorie') renderCostiCategorie(main, byCat, byForn, totAnnoCorrente, totAnnoPrec, mediaMensileTot);
  else if(state.costRec.view === 'fornitori') renderCostiFornitori(main, byForn, state.costRec.cat);
  else if(state.costRec.view === 'dettaglio') renderCostiDettaglio(main, byForn, state.costRec.forn);
}

function renderCostiCategorie(main, byCat, byForn, totCur, totPrev, mediaMensile){
  const cats = Object.entries(byCat).sort((a,b)=>b[1].curAnno-a[1].curAnno);
  const anomalie = Object.entries(byForn).filter(([_,v])=>v.anomalia);
  const delta = totPrev>0 ? ((totCur-totPrev)/totPrev*100) : 0;
  main.innerHTML = `
    <div class="stats three">
      <div class="stat accent"><div class="label">Costi ${ANNO}</div><div class="value" style="font-size:17px">${euro(totCur)}</div><div class="sub">ricorrenti</div></div>
      <div class="stat"><div class="label">Media mese</div><div class="value" style="font-size:17px">${euro(mediaMensile)}</div><div class="sub">spesa media</div></div>
      <div class="stat ${delta>0?'danger':'success'}"><div class="label">vs ${ANNO-1}</div><div class="value" style="font-size:17px">${delta>0?'+':''}${delta.toFixed(0)}%</div><div class="sub">${euro(totPrev)}</div></div>
    </div>
    ${anomalie.length ? `
    <div class="card" style="background:#fef3c7;border:1px solid #fbbf24;padding:12px">
      <div style="font-weight:700;color:#92400e;margin-bottom:6px">⚠️ ${anomalie.length} bollett${anomalie.length===1?'a':'e'} anomal${anomalie.length===1?'a':'e'}</div>
      ${anomalie.slice(0,3).map(([n,v])=>`<div style="font-size:12px;color:#7c2d12">• ${escapeHtml(n.slice(0,35))}: ultima ${euro(v.ultimoImporto)} (+${Math.round(((v.ultimoImporto/v.mediaMensile-1)*100))}% sulla media)</div>`).join('')}
    </div>`:''}
    <div class="section-title">Categorie</div>
    ${cats.map(([cat,v])=>{
      const info = CATEGORIE_RICORRENTI[cat] || CATEGORIE_RICORRENTI.Altro;
      const nForn = v.fornitori.size;
      return `<div class="list-item" data-cat="${escapeHtml(cat)}" style="padding:14px">
        <div class="li-top">
          <div class="li-title" style="font-size:15px">${info.icon} ${escapeHtml(cat)}<span class="small" style="font-size:11px">${nForn} fornitor${nForn===1?'e':'i'} · ${v.n} fattur${v.n===1?'a':'e'}</span></div>
          <div class="li-amount" style="font-size:15px;color:${info.color}">${euro(v.curAnno)}</div>
        </div>
      </div>`;
    }).join('')}
    <div style="margin-top:16px;padding:10px;background:#f8fafc;border-radius:10px;border:1px solid #e2e8f0">
      <div style="font-size:11px;color:#475569;line-height:1.5">💡 La lista dei fornitori ricorrenti può essere ampliata modificando <code>RICORRENTI_KEYWORDS</code> nel codice dell'app.</div>
    </div>
  `;
  main.querySelectorAll('.list-item[data-cat]').forEach(el=>{
    el.onclick = ()=>{ state.costRec.view='fornitori'; state.costRec.cat=el.dataset.cat; render_costi_ricorrenti(main); };
  });
}

function renderCostiFornitori(main, byForn, catFilter){
  const lista = Object.entries(byForn).filter(([_,v])=>v.cat===catFilter).sort((a,b)=>b[1].curAnno-a[1].curAnno);
  const info = CATEGORIE_RICORRENTI[catFilter] || CATEGORIE_RICORRENTI.Altro;
  const totCat = lista.reduce((s,[_,v])=>s+v.curAnno,0);
  main.innerHTML = `
    <button class="btn btn-ghost btn-sm" onclick="state.costRec.view='categorie';state.costRec.cat=null;reloadModule()" style="margin-bottom:10px">← Tutte le categorie</button>
    <div class="card" style="background:${info.color}15;border:1px solid ${info.color}44;padding:14px">
      <div style="font-size:15px;font-weight:700;color:${info.color}">${info.icon} ${catFilter}</div>
      <div style="font-size:20px;font-weight:800;margin-top:4px">${euro(totCat)}</div>
      <div style="font-size:11px;color:#475569">Totale ${ANNO} · ${lista.length} fornitor${lista.length===1?'e':'i'}</div>
    </div>
    <div class="section-title">Fornitori</div>
    ${lista.map(([nome,v])=>{
      const deltaPct = v.prevAnno>0 ? ((v.curAnno-v.prevAnno)/v.prevAnno*100) : null;
      return `<div class="list-item" data-forn="${encodeURIComponent(nome)}" style="padding:14px">
        <div class="li-top">
          <div class="li-title">${escapeHtml(nome.slice(0,40))}<span class="small">${v.n} fatt · media ${euro(v.mediaMensile)}/mese</span></div>
          <div class="li-amount">${euro(v.curAnno)}</div>
        </div>
        <div class="li-bottom">
          ${v.anomalia?'<span class="badge danger">⚠️ anomalia ultima bolletta</span>':''}
          ${deltaPct!==null?`<span class="li-meta">${deltaPct>0?'+':''}${deltaPct.toFixed(0)}% vs ${ANNO-1}</span>`:''}
        </div>
      </div>`;
    }).join('')}
  `;
  main.querySelectorAll('.list-item[data-forn]').forEach(el=>{
    el.onclick = ()=>{ state.costRec.view='dettaglio'; state.costRec.forn=decodeURIComponent(el.dataset.forn); render_costi_ricorrenti(main); };
  });
}

function renderCostiDettaglio(main, byForn, fornName){
  const v = byForn[fornName];
  if(!v){ main.innerHTML='<div class="empty"><div class="icon">❌</div><div class="title">Fornitore non trovato</div></div>'; return; }
  const info = CATEGORIE_RICORRENTI[v.cat] || CATEGORIE_RICORRENTI.Altro;

  // Ordina mesi dal più recente
  const mesi = Object.entries(v.perMese).sort((a,b)=>b[0].localeCompare(a[0]));
  const maxMese = Math.max(...Object.values(v.perMese));

  main.innerHTML = `
    <button class="btn btn-ghost btn-sm" onclick="state.costRec.view='fornitori';state.costRec.forn=null;reloadModule()" style="margin-bottom:10px">← ${escapeHtml(v.cat)}</button>
    <div class="card" style="background:${info.color}15;border:1px solid ${info.color}44;padding:14px">
      <div style="font-size:14px;font-weight:700">${info.icon} ${escapeHtml(fornName)}</div>
      <div style="display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-top:10px">
        <div><div style="font-size:10px;color:#64748B">Totale ${ANNO}</div><div style="font-size:17px;font-weight:700">${euro(v.curAnno)}</div></div>
        <div><div style="font-size:10px;color:#64748B">Media mese</div><div style="font-size:17px;font-weight:700">${euro(v.mediaMensile)}</div></div>
        ${v.prevAnno>0?`<div><div style="font-size:10px;color:#64748B">Totale ${ANNO-1}</div><div style="font-size:14px">${euro(v.prevAnno)}</div></div>`:''}
        <div><div style="font-size:10px;color:#64748B">N. fatture</div><div style="font-size:14px">${v.n}</div></div>
      </div>
      ${v.anomalia?`<div class="alert-row danger" style="margin-top:10px">
        <div class="a-icon">⚠️</div>
        <div class="a-body">
          <div class="a-title" style="font-size:12px">Ultima bolletta anomala</div>
          <div class="a-sub" style="font-size:11px">${euro(v.ultimoImporto)} vs media ${euro(v.mediaMensile)} (+${Math.round(((v.ultimoImporto/v.mediaMensile-1)*100))}%)</div>
        </div>
      </div>`:''}
    </div>

    <div class="section-title">Spesa per mese</div>
    <div class="card" style="padding:12px">
      ${mesi.map(([k, imp])=>{
        const pct = (imp/maxMese)*100;
        const [anno,m] = k.split('-');
        const nomeMese = ['','Gen','Feb','Mar','Apr','Mag','Giu','Lug','Ago','Set','Ott','Nov','Dic'][parseInt(m)];
        return `<div style="margin-bottom:8px">
          <div style="display:flex;justify-content:space-between;font-size:12px;margin-bottom:4px">
            <span>${nomeMese} ${anno}</span>
            <span style="font-weight:700">${euro(imp)}</span>
          </div>
          <div style="background:#f1f5f9;border-radius:4px;height:6px;overflow:hidden">
            <div style="background:${info.color};height:100%;width:${pct}%"></div>
          </div>
        </div>`;
      }).join('')}
    </div>

    <div class="section-title">Tutte le fatture (${v.fatture.length})</div>
    ${v.fatture.sort((a,b)=>(b.invoice_date||b.data_fattura||'').localeCompare(a.invoice_date||a.data_fattura||'')).map(f=>{
      const num = f.invoice_number || f.numero_fattura || '-';
      const d = f.invoice_date || f.data_fattura || '';
      const tot = Number(f.total_amount || f.importo_totale || 0);
      const isPagata = (f.pagato===true)||(f.stato==='pagata')||(f.status==='paid');
      const fid = f.id || f.invoice_key || '';
      return `<div class="list-item" data-fid="${encodeURIComponent(fid)}" onclick="openFatturaSheet('${encodeURIComponent(fid)}')">
        <div class="li-top">
          <div class="li-title">N. ${escapeHtml(num)}<span class="small">${fmtDate(d)}</span></div>
          <div class="li-amount">${euro(tot)}</div>
        </div>
        <div class="li-bottom">
          ${isPagata?'<span class="badge success">Pagata</span>':'<span class="badge info">Da pagare</span>'}
        </div>
      </div>`;
    }).join('')}
  `;
}
</script><script>
async function render_prima_nota_cassa(main){
  state.pnc = state.pnc || {mese:null};
  const params = new URLSearchParams({anno:String(ANNO)});
  if(state.pnc.mese) params.set('mese', String(state.pnc.mese));
  const data = await api(`/api/prima-nota/cassa?${params}`);
  const movs = Array.isArray(data)?data:(data.items||data.movimenti||data.cassa||[]);
  // Il backend restituisce tipo='entrata'/'uscita' + importo POSITIVO, e totali aggregati già calcolati.
  // Usali se presenti, altrimenti ricalcola.
  const isEntrata = m => m.tipo==='entrata' || Number(m.importo)>0 && !m.tipo;
  const entr = Number(data.totale_entrate ?? movs.filter(m=>isEntrata(m)).reduce((s,m)=>s+Math.abs(Number(m.importo||0)),0));
  const usc  = Number(data.totale_uscite  ?? movs.filter(m=>!isEntrata(m)).reduce((s,m)=>s+Math.abs(Number(m.importo||0)),0));
  const saldoAnno = Number(data.saldo_anno ?? (entr - usc));
  const saldoTot  = Number(data.saldo ?? saldoAnno);
  // Totali per categoria (client-side)
  const signedImp = m => (isEntrata(m) ? 1 : -1) * Math.abs(Number(m.importo||0));
  const totCorrisp = movs.filter(m=>(m.categoria||'').toLowerCase()==='corrispettivi').reduce((s,m)=>s+Math.abs(Number(m.importo||0)),0);
  const totPOS = movs.filter(m=>(m.categoria||'').toLowerCase()==='pos').reduce((s,m)=>s+Math.abs(Number(m.importo||0)),0);
  const totVers = movs.filter(m=>{const c=(m.categoria||'').toLowerCase();return c==='versamento'||c==='versamenti';}).reduce((s,m)=>s+Math.abs(Number(m.importo||0)),0);
  const totFatt = movs.filter(m=>m.fattura_id||(m.categoria||'').toLowerCase().includes('fattura')).reduce((s,m)=>s+Math.abs(Number(m.importo||0)),0);
  // Ordina per data desc
  movs.sort((a,b)=>(b.data||'').localeCompare(a.data||''));
  main.innerHTML = `
    <div class="stats three">
      <div class="stat success"><div class="label">Entrate ${ANNO}</div><div class="value" style="font-size:15px">${euro(entr)}</div></div>
      <div class="stat danger"><div class="label">Uscite ${ANNO}</div><div class="value" style="font-size:15px">${euro(usc)}</div></div>
      <div class="stat ${saldoAnno>=0?'accent':'danger'}"><div class="label">Saldo ${ANNO}</div><div class="value" style="font-size:15px">${euro(saldoAnno)}</div></div>
    </div>
    ${Math.abs(saldoTot - saldoAnno) > 0.01 ? `
    <div class="alert-row ${saldoTot<0?'danger':'info'}" style="margin-bottom:12px">
      <div class="a-icon">💼</div>
      <div class="a-body">
        <div class="a-title" style="font-size:12px">Saldo complessivo cassa: ${euro(saldoTot)}</div>
        <div class="a-sub" style="font-size:11px">Include saldi anni precedenti (${euro(Number(data.saldo_precedente||0))})</div>
      </div>
    </div>` : ''}
    <div class="stats" style="grid-template-columns:repeat(4,1fr);gap:6px">
      <div class="stat" style="padding:10px"><div class="label" style="font-size:9px">Corrisp.</div><div class="value" style="font-size:12px;color:#ff9800">${euro(totCorrisp)}</div></div>
      <div class="stat" style="padding:10px"><div class="label" style="font-size:9px">POS</div><div class="value" style="font-size:12px;color:#1e3a5f">${euro(totPOS)}</div></div>
      <div class="stat" style="padding:10px"><div class="label" style="font-size:9px">Versam.</div><div class="value" style="font-size:12px;color:#059669">${euro(totVers)}</div></div>
      <div class="stat" style="padding:10px"><div class="label" style="font-size:9px">Fatture</div><div class="value" style="font-size:12px;color:#ef4444">${euro(totFatt)}</div></div>
    </div>
    <div class="card" style="padding:12px;background:#f8fafc;border:1px solid #e2e8f0">
      <div style="font-weight:700;font-size:14px;margin-bottom:10px">⚡ Chiusure giornaliere</div>
      <div style="display:grid;grid-template-columns:1fr 1fr;gap:8px">
        <button class="btn btn-warning btn-sm" style="padding:12px 8px;font-size:13px" onclick="apriFormCorrisp()">📊 Corrispettivo</button>
        <button class="btn btn-sm" style="background:#1e3a5f;color:#fff;padding:12px 8px;font-size:13px" onclick="apriFormPOS()">💳 POS</button>
        <button class="btn btn-success btn-sm" style="padding:12px 8px;font-size:13px" onclick="apriFormVers()">🏦 Versamento</button>
        <button class="btn btn-sm" style="background:#f97316;color:#fff;padding:12px 8px;font-size:13px" onclick="apriFormAltro('cassa')">✏️ Altro</button>
      </div>
    </div>
    <div class="month-selector">
      <button class="m ${!state.pnc.mese?'active':''}" data-mese="">Tutti</button>
      ${getMesi().map(m=>`<button class="m ${state.pnc.mese===m.n?'active':''}" data-mese="${m.n}">${m.label}</button>`).join('')}
    </div>
    <div class="section-title">Movimenti (${movs.length}) <span class="link" onclick="syncFatturePagate()">🔄 Sync fatture</span></div>
    <div id="lstC">${movs.length ? movs.map(m=>{
      const imp = Math.abs(Number(m.importo||0));
      const pos = isEntrata(m);
      const cat = (m.categoria||'').toLowerCase();
      const catColor = cat==='corrispettivi'?'#ff9800':(cat==='pos'?'#1e3a5f':(cat==='versamento'||cat==='versamenti'?'#059669':(m.fattura_id?'#ef4444':'#64748B')));
      return `<div class="list-item" data-mov='${encodeURIComponent(JSON.stringify(m))}'>
        <div class="li-top">
          <div class="li-title">${escapeHtml(m.descrizione||m.categoria||'-')}<span class="small">${fmtDate(m.data)}</span></div>
          <div class="li-amount ${pos?'positive':'negative'}">${pos?'+':'-'}${euro(imp)}</div>
        </div>
        <div class="li-bottom">
          <span class="badge" style="background:${catColor};color:#fff">${escapeHtml(m.categoria||(pos?'Entrata':'Uscita'))}</span>
          ${m.provvisorio?'<span class="badge warning">Provvisorio</span>':''}
          ${m.fattura_id?`<span class="li-meta">→ fattura ${String(m.fattura_id).slice(0,10)}</span>`:''}
        </div>
      </div>`;
    }).join('') : '<div class="empty"><div class="icon">💰</div><div class="title">Nessun movimento cassa</div></div>'}</div>
  `;
  main.querySelectorAll('.month-selector .m').forEach(b=>{
    b.onclick = ()=>{ state.pnc.mese = b.dataset.mese ? parseInt(b.dataset.mese) : null; render_prima_nota_cassa(main); };
  });
  main.querySelectorAll('.list-item[data-mov]').forEach(el=>{
    el.onclick = ()=>openMovimentoSheet('cassa', JSON.parse(decodeURIComponent(el.dataset.mov)));
  });

function apriFormCorrisp(){
  const oggi = new Date().toISOString().slice(0,10);
  openSheet(`<h2>📊 Chiusura giornaliera</h2>
    <p class="muted" style="margin:0 0 12px;font-size:12px">Incasso giornaliero. Solo i <b>contanti</b> entrano in cassa. POS va in banca. IVA 10%.</p>
    <div class="field"><label>Data</label><input id="fCorrData" class="input" type="date" value="${oggi}"></div>
    <div class="field"><label>💵 Contanti incassati (€)</label>
      <input id="fCorrCont" class="input" type="number" step="0.01" inputmode="decimal" placeholder="0,00" oninput="ricalcCorr()"></div>
    <div class="field"><label>💳 POS incassato (€)</label>
      <input id="fCorrPos" class="input" type="number" step="0.01" inputmode="decimal" placeholder="0,00" oninput="ricalcCorr()"></div>
    <div class="card" style="padding:12px;background:#F1F5F9;margin:10px 0">
      <div class="kv"><span class="k">Totale lordo</span><span class="v" id="fCorrTot" style="font-weight:800">€ 0,00</span></div>
      <div class="kv"><span class="k">Imponibile (senza IVA 10%)</span><span class="v" id="fCorrImp">€ 0,00</span></div>
      <div class="kv"><span class="k">IVA 10%</span><span class="v" id="fCorrIva">€ 0,00</span></div>
    </div>
    <button class="btn btn-warning btn-block" style="padding:14px" onclick="salvaFormCorrisp()">💾 Salva chiusura</button>
    <button class="btn btn-ghost btn-block" style="margin-top:8px" onclick="closeSheet()">Annulla</button>`);
  setTimeout(()=>$('fCorrCont')?.focus(),100);
}
function ricalcCorr(){
  const cont = parseFloat($('fCorrCont')?.value)||0;
  const pos = parseFloat($('fCorrPos')?.value)||0;
  const tot = cont+pos;
  const imp = tot/1.10;
  const iva = tot-imp;
  if($('fCorrTot')) $('fCorrTot').textContent = euro(tot);
  if($('fCorrImp')) $('fCorrImp').textContent = euro(imp);
  if($('fCorrIva')) $('fCorrIva').textContent = euro(iva);
}
async function salvaFormCorrisp(){
  const data=$('fCorrData').value;
  const cont = parseFloat($('fCorrCont').value)||0;
  const pos = parseFloat($('fCorrPos').value)||0;
  if(cont===0 && pos===0) return toast('Inserisci contanti o POS','error');
  const totale = cont+pos;
  try{
    // 1. Registra corrispettivo completo (entrambi contanti+POS) nel modulo corrispettivi se possibile
    try{
      await api('/api/corrispettivi',{method:'POST',body:JSON.stringify({
        data, contanti:cont, pos:pos, totale:totale,
        imponibile: Math.round((totale/1.10)*100)/100,
        iva: Math.round((totale-totale/1.10)*100)/100,
        aliquota_iva: 10,
        origine:'mobile_chiusura'
      })});
    }catch{}
    // 2. In cassa va solo il contante (DARE)
    if(cont>0){
      await api('/api/prima-nota/cassa',{method:'POST',body:JSON.stringify({
        data, tipo:'entrata', importo:cont,
        descrizione:`Corrispettivo contanti ${data}`,
        categoria:'Corrispettivi', source:'manual_entry', provvisorio:true
      })});
    }
    // 3. POS: in banca come accredito (quando arriva) - NON in cassa
    if(pos>0){
      try{
        await api('/api/prima-nota/banca',{method:'POST',body:JSON.stringify({
          data, tipo:'entrata', importo:pos,
          descrizione:`POS corrispettivo ${data} (atteso accredito)`,
          categoria:'POS', source:'manual_pos', provvisorio:true
        })});
      }catch{}
    }
    toast('Chiusura salvata','success');haptic(30);closeSheet();reloadModule();
  }catch(e){toast('Errore: '+e.message,'error');}
}

function getResiduo(f){
  if(f.residuo!=null) return Number(f.residuo);
  // FIX: il backend usa total_amount (en) o importo_totale (it)
  const t = Number(f.total_amount || f.importo_totale || f.totale || 0);
  const p = Number(f.importo_pagato || f.amount_paid || 0);
  // ATTENZIONE: f.pagato a volte è BOOLEAN ("pagata sì/no"), NON l'importo pagato.
  // Non usarlo come numero. Se è booleano true e residuo sconosciuto, la fattura è pagata -> residuo 0.
  if(f.pagato === true || f.stato === 'pagata' || f.status === 'paid') return 0;
  return Math.max(0, t - p);
}
function fatturaCardHTML(f){
  const res = getResiduo(f);
  const sup = f.cedente_denominazione || f.supplier_name || f.fornitore_denominazione || f.fornitore_ragione_sociale || '-';
  const num = f.invoice_number || f.numero_fattura || f.numero_documento || f.numero || '-';
  const fid = f.id || f.invoice_key || f._id || '';
  const dataFatt = f.data_fattura || f.invoice_date || f.data_documento || '';
  const dataScad = f.data_scadenza || f.due_date || '';
  const tot = Number(f.total_amount || f.importo_totale || f.totale || 0);
  const isPagata = (f.pagato === true) || (f.stato === 'pagata') || (f.status === 'paid') || (res <= 0.01 && tot > 0);
  const isScaduta = !isPagata && dataScad && new Date(dataScad) < new Date();
  const badge = isPagata
    ? '<span class="badge success">Pagata</span>'
    : (isScaduta ? '<span class="badge danger">Scaduta</span>' : '<span class="badge info">Da pagare</span>');
  return `<div class="list-item" data-fid="${encodeURIComponent(fid)}">
    <div class="li-top">
      <div class="li-title">${escapeHtml(sup)}<span class="small">N. ${escapeHtml(num)} · ${fmtDate(dataFatt)}</span></div>
      <div class="li-amount">${euro(isPagata ? tot : (res > 0 ? res : tot))}</div>
    </div>
    <div class="li-bottom">${badge}<span class="li-meta">${dataScad ? 'Scad. '+fmtDate(dataScad) : ''}</span></div>
  </div>`;
}

async function registraPagamentoFattura(fidEnc){
  const fid = decodeURIComponent(fidEnc);
  const amount = parseFloat($('pagA').value);
  const method = $('pagM').value;
  const data = $('pagD').value;
  if(!(amount>0)) return toast('Importo non valido','error');
  try{
    await api('/api/pagamenti/registra', {method:'POST', body:JSON.stringify({fattura_id:fid, importo:amount, metodo:method, data, note:`Registrato da mobile`})});
    toast('Pagamento registrato','success');haptic(30);closeSheet();reloadModule();
  }catch(e){
    // fallback a endpoint vecchio
    try{
      await api(`/api/invoices/${encodeURIComponent(fid)}/payment?amount=${amount}&payment_method=${method}`, {method:'POST'});
      toast('Pagamento registrato','success');haptic(30);closeSheet();reloadModule();
    }catch(e2){ toast('Errore: '+e.message,'error'); }
  }
}

async function render_iva(main){
  state.iva = state.iva || {mese: null};
  const annuale = state.iva.mese ? null : await api(`/api/iva/annual/${ANNO}`).catch(()=>null);
  const mensile = state.iva.mese ? await api(`/api/iva/monthly/${ANNO}/${state.iva.mese}`).catch(()=>null) : null;
  const raw = mensile || annuale || {};

  // Backend in annuale ritorna {anno, monthly_data:[{mese, iva_debito, iva_credito, saldo, ...}]}
  // Backend in mensile ritorna {anno, mese, daily_data:[{data, iva_debito, ...}], totali?} e alcuni campi aggregati
  // Normalizza entrambi i casi in un unico oggetto 'data' con iva_debito/iva_credito/saldo aggregati
  let data = {};
  if(annuale && Array.isArray(annuale.monthly_data)){
    data.iva_debito = annuale.monthly_data.reduce((s,m)=>s+Number(m.iva_debito||0),0);
    data.iva_credito = annuale.monthly_data.reduce((s,m)=>s+Number(m.iva_credito||0),0);
    data.imponibile_netto = annuale.monthly_data.reduce((s,m)=>s+Number(m.imponibile_netto||0),0);
    data.saldo = data.iva_debito - data.iva_credito;
    // Ultimo mese con dati → stato progressivo
    const ultimoMese = [...annuale.monthly_data].reverse().find(m=>m.fatture_count||m.corrispettivi_count||m.iva_debito||m.iva_credito);
    if(ultimoMese){
      data.saldo_progressivo = Number(ultimoMese.saldo_progressivo||0);
      data.stato_progressivo = ultimoMese.stato_progressivo;
      data.importo_da_versare = Number(ultimoMese.importo_da_versare||0);
    }
    data.monthly_data = annuale.monthly_data;
  } else if(mensile) {
    // Prova a calcolare aggregati dal daily_data se i totali non sono esposti direttamente
    if(Array.isArray(mensile.daily_data)){
      data.iva_debito = mensile.daily_data.reduce((s,d)=>s+Number(d.iva_debito||0),0);
      data.iva_credito = mensile.daily_data.reduce((s,d)=>s+Number(d.iva_credito||0),0);
      data.imponibile_netto = mensile.daily_data.reduce((s,d)=>s+Number(d.imponibile_netto||0),0);
      data.saldo = data.iva_debito - data.iva_credito;
      // Prendi ultimo giorno con saldo_progressivo
      const ultG = [...mensile.daily_data].reverse().find(d=>d.has_data);
      if(ultG) data.saldo_progressivo = Number(ultG.saldo_progressivo||0);
    }
    // Se invece il backend espone campi al top-level li usa direttamente
    Object.assign(data, {
      iva_debito: data.iva_debito || mensile.iva_debito,
      iva_credito: data.iva_credito || mensile.iva_credito,
      saldo: data.saldo || mensile.saldo,
    });
    data.daily_data = mensile.daily_data;
  }

  main.innerHTML = `
    <div class="month-selector">
      <button class="m ${!state.iva.mese?'active':''}" data-mese="">Anno</button>
      ${getMesi().map(m=>`<button class="m ${state.iva.mese===m.n?'active':''}" data-mese="${m.n}">${m.label}</button>`).join('')}
    </div>
    <div class="stats">
      <div class="stat accent">
        <div class="label">IVA a debito</div>
        <div class="value" style="font-size:17px">${euro(Number(data.iva_debito||0))}</div>
      </div>
      <div class="stat success">
        <div class="label">IVA a credito</div>
        <div class="value" style="font-size:17px">${euro(Number(data.iva_credito||0))}</div>
      </div>
    </div>
    <div class="stats one">
      <div class="stat ${Number(data.saldo||0)>=0?'danger':'success'}">
        <div class="label">${state.iva.mese?`${fmtMonth(state.iva.mese)} ${ANNO}`:`Anno ${ANNO}`}</div>
        <div class="value">${euro(Math.abs(Number(data.saldo||0)))}</div>
        <div class="sub">${Number(data.saldo||0)>=0?'a debito':'a credito'}</div>
      </div>
    </div>
    ${data.imponibile_netto ? `
    <div class="card">
      <h3>Imponibile ${state.iva.mese?fmtMonth(state.iva.mese):ANNO}</h3>
      <div class="value" style="font-size:20px">${euro(Number(data.imponibile_netto))}</div>
    </div>` : ''}
    ${data.monthly_data ? `
    <div class="card">
      <h3>Dettaglio mensile</h3>
      ${data.monthly_data.filter(m=>m.fatture_count||m.corrispettivi_count||m.iva_debito||m.iva_credito).map(m=>`
        <div class="list-item" data-mese-iva="${m.mese}">
          <div class="li-top">
            <div class="li-title">${escapeHtml(m.mese_nome)}<span class="small">${m.fatture_count} fatt · ${m.corrispettivi_count} corr</span></div>
            <div class="li-amount ${Number(m.saldo)>=0?'negative':'positive'}">${euro(Math.abs(Number(m.saldo||0)))}</div>
          </div>
          <div class="li-bottom">
            <span class="badge ${Number(m.saldo)>=0?'danger':'success'}">${m.stato||(Number(m.saldo)>=0?'Debito':'Credito')}</span>
            <span class="li-meta">D: ${euro(m.iva_debito)} · C: ${euro(m.iva_credito)}</span>
          </div>
        </div>`).join('')}
    </div>` : ''}
  `;
  main.querySelectorAll('.month-selector .m').forEach(b=>{
    b.onclick=()=>{state.iva.mese = b.dataset.mese?parseInt(b.dataset.mese):null; render_iva(main);};
  });
  main.querySelectorAll('.list-item[data-mese-iva]').forEach(el=>{
    el.onclick=()=>{state.iva.mese=parseInt(el.dataset.meseIva); render_iva(main);};
  });
}

async function render_dipendenti(main){
  state.dip = state.dip || {srch:''};
  main.innerHTML = `
    <div class="search-bar">
      <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
      <input id="srchD" type="search" placeholder="Cerca dipendente..." value="${escapeHtml(state.dip.srch)}">
    </div>
    <div id="lstD"><div class="loading"><span class="spinner"></span>Carico...</div></div>
  `;
  const data = await api('/api/dipendenti?limit=500');
  const list = Array.isArray(data)?data:(data.items||data.dipendenti||[]);
  const att = list.filter(d=>d.stato==='attivo'||d.is_active||(!d.data_cessazione&&!d.cessato));
  const ces = list.length - att.length;
  const render = ()=>{
    const q = ($('srchD').value||'').toLowerCase().trim();
    state.dip.srch = q;
    let filt = list;
    if(q) filt = list.filter(d=>{const t=[d.cognome,d.nome,d.nome_completo,d.codice_fiscale,d.cf].filter(Boolean).join(' ').toLowerCase();return t.includes(q);});
    $('lstD').innerHTML = `
      <div class="stats">
        <div class="stat success"><div class="label">Attivi</div><div class="value">${att.length}</div></div>
        <div class="stat"><div class="label">Cessati</div><div class="value">${ces}</div></div>
      </div>
      <div class="section-title">Elenco (${filt.length})</div>
      ${filt.length ? filt.map(d=>{
        const nome = `${d.cognome||''} ${d.nome||''}`.trim() || d.nome_completo || '-';
        const attivo = d.stato==='attivo'||d.is_active||(!d.data_cessazione&&!d.cessato);
        return `<div class="list-item" data-dip='${encodeURIComponent(JSON.stringify(d))}'>
          <div class="li-top">
            <div class="li-title">${escapeHtml(nome)}<span class="small">${escapeHtml(d.mansione||d.ruolo||'-')}</span></div>

            ${attivo?'<span class="badge success">Attivo</span>':'<span class="badge neutral">Cessato</span>'}

          </div>
        </div>`;
      }).join('') : '<div class="empty"><div class="icon">👥</div><div class="title">Nessun dipendente</div></div>'}

    $('lstD').querySelectorAll('.list-item[data-dip]').forEach(el=>{
      el.onclick = ()=>openDipendenteSheet(JSON.parse(decodeURIComponent(el.dataset.dip)));
    });
  };
  render();
  $('srchD').addEventListener('input', debounce(render,200));
}

async function render_riconciliazione(main){
  const [mov, fat, stats] = await Promise.all([
    api(`/api/estratto-conto-movimenti/movimenti?riconciliato=false&limit=100&anno=${ANNO}`).catch(()=>[]),
    api(`/api/invoices?anno=${ANNO}&limit=500`).catch(()=>[]),
    api(`/api/riconciliazione-auto/stats-riconciliazione?anno=${ANNO}`).catch(()=>null),
  ]);
  const lMov = Array.isArray(mov)?mov:(mov.items||[]);
  const lFatAll = Array.isArray(fat)?fat:(fat.items||fat.invoices||[]);
  // Filtra non pagate client-side (endpoint /api/invoices/list ritorna sempre vuoto in produzione)
  const lFat = lFatAll.filter(f => {
    const res = (f.residuo!=null) ? f.residuo : Math.max(0, Number(f.importo_totale||f.totale||0) - Number(f.importo_pagato||f.pagato||0));
    return !(f.pagato===true || f.stato==='pagata' || f.status==='paid' || res<=0.01);
  });
  main.innerHTML = `
    <div class="stats">
      <div class="stat warning"><div class="label">Movimenti aperti</div><div class="value">${lMov.length}</div><div class="sub">da riconciliare</div></div>
      <div class="stat accent"><div class="label">Fatture aperte</div><div class="value">${lFat.length}</div></div>
    </div>
    ${stats?`<div class="card"><h3>📊 Stato riconciliazione</h3>
      <div class="kv"><span class="k">Riconciliate</span><span class="v" style="color:var(--success);font-weight:800">${stats.riconciliate||0}</span></div>
      <div class="kv"><span class="k">Match automatici</span><span class="v">${stats.auto_match||0}</span></div>
      <div class="kv"><span class="k">Da verificare</span><span class="v" style="color:var(--warning);font-weight:800">${stats.da_verificare||0}</span></div>
    </div>`:''}
    <button class="btn btn-primary btn-block" onclick="avviaRiconciliazione()">▶️ Avvia riconciliazione automatica</button>
    ${lMov.length?`<div class="section-title">Movimenti da riconciliare (${lMov.length})</div>
    <div>${lMov.slice(0,20).map(m=>{
      const imp=Number(m.importo||0);const pos=imp>=0;
      return `<div class="list-item">
        <div class="li-top">
          <div class="li-title">${escapeHtml(m.descrizione||m.description||'-')}<span class="small">${fmtDate(m.data)}</span></div>
          <div class="li-amount ${pos?'positive':'negative'}">${pos?'+':''}${euro(imp)}</div>
        </div>
      </div>`;
    }).join('')}</div>`:''}
  `;
}
async function avviaRiconciliazione(){
  if(!confirm('Avviare riconciliazione automatica?'))return;
  try{await api('/api/riconciliazione-auto/riconcilia-estratto-conto',{method:'POST',body:JSON.stringify({anno:ANNO})});toast('Riconciliazione avviata','success');setTimeout(reloadModule,1500);}
  catch(e){toast('Errore: '+e.message,'error');}
}
