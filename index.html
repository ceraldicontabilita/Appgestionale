<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, maximum-scale=1.0, user-scalable=no">
<meta name="theme-color" content="#1E1B4B">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="mobile-web-app-capable" content="yes">
<title>Ceraldi · Gestionale Mobile</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<style>
:root{
  --primary:#5D29C7; --primary-soft:#EFE7FF;
  --bg:#F0F4FA; --card:#FFFFFF; --sidebar:#1E1B4B;
  --success:#00B884; --success-soft:#D4F5EA;
  --warning:#FF9800; --warning-soft:#FFE9CC;
  --danger:#F44336; --danger-soft:#FFDAD7;
  --info:#2196F3; --info-soft:#D7EBFB;
  --text:#0F172A; --text-2:#64748B; --border:#E2E8F0;
  --safe-top:env(safe-area-inset-top,0px);
  --safe-bot:env(safe-area-inset-bottom,0px);
}
*{box-sizing:border-box;-webkit-tap-highlight-color:transparent}
html,body{margin:0;padding:0;height:100%;overscroll-behavior-y:none}
body{font-family:'Plus Jakarta Sans',-apple-system,system-ui,sans-serif;font-size:15px;color:var(--text);background:var(--bg);-webkit-font-smoothing:antialiased}
button,input,select,textarea{font-family:inherit;font-size:inherit;color:inherit}
.app{display:flex;flex-direction:column;min-height:100vh;min-height:100dvh}
.topbar{position:sticky;top:0;z-index:40;background:var(--sidebar);color:#fff;padding:calc(12px + var(--safe-top)) 14px 12px;display:flex;align-items:center;gap:10px;box-shadow:0 2px 10px rgba(30,27,75,.15)}
.topbar .menu-btn{width:36px;height:36px;border-radius:10px;border:none;background:rgba(255,255,255,.1);color:#fff;display:grid;place-items:center;cursor:pointer}
.topbar .menu-btn:active{background:rgba(255,255,255,.2)}
.topbar .title-wrap{flex:1;min-width:0}
.topbar .title{font-weight:700;font-size:16px;letter-spacing:-.01em;line-height:1.1}
.topbar .title-sub{font-weight:500;opacity:.65;font-size:11px;margin-top:2px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.topbar .actions{display:flex;gap:6px}
.icon-btn{width:36px;height:36px;border-radius:10px;border:none;background:rgba(255,255,255,.1);color:#fff;display:grid;place-items:center;cursor:pointer;transition:background .15s}
.icon-btn:active{background:rgba(255,255,255,.2)}
main{flex:1;padding:14px 14px calc(30px + var(--safe-bot));max-width:720px;margin:0 auto;width:100%}
.drawer-overlay{position:fixed;inset:0;background:rgba(15,23,42,.5);z-index:90;opacity:0;pointer-events:none;transition:opacity .2s}
.drawer-overlay.show{opacity:1;pointer-events:auto}
.drawer{position:fixed;top:0;left:0;bottom:0;width:82%;max-width:320px;background:var(--sidebar);color:#fff;z-index:91;transform:translateX(-100%);transition:transform .25s cubic-bezier(.4,0,.2,1);display:flex;flex-direction:column;padding:calc(24px + var(--safe-top)) 0 calc(16px + var(--safe-bot))}
.drawer.show{transform:translateX(0)}
.drawer-head{padding:0 20px 20px;border-bottom:1px solid rgba(255,255,255,.08);display:flex;align-items:center;gap:12px}
.drawer-head .logo{width:44px;height:44px;border-radius:12px;background:linear-gradient(135deg,#8B5CF6 0%,#5D29C7 100%);display:grid;place-items:center;font-weight:800;font-size:18px}
.drawer-head h2{margin:0;font-size:16px;font-weight:700}
.drawer-head .sub{opacity:.6;font-size:11px;margin-top:2px}
.drawer-nav{flex:1;overflow-y:auto;padding:10px}
.drawer-item{display:flex;align-items:center;gap:12px;padding:12px 14px;border-radius:12px;color:rgba(255,255,255,.75);font-weight:600;font-size:14px;cursor:pointer;border:none;background:none;width:100%;text-align:left;margin-bottom:2px;transition:background .15s,color .15s}
.drawer-item:active{background:rgba(255,255,255,.08)}
.drawer-item.active{background:rgba(255,255,255,.12);color:#fff}
.drawer-item svg{width:20px;height:20px;flex-shrink:0}
.drawer-item .count{margin-left:auto;background:rgba(255,255,255,.15);color:#fff;padding:2px 8px;border-radius:10px;font-size:11px;font-weight:700;min-width:24px;text-align:center}
.drawer-item .count.urgent{background:var(--danger);color:#fff}
.drawer-section{padding:10px 18px 6px;font-size:10px;text-transform:uppercase;letter-spacing:.1em;color:rgba(255,255,255,.4);font-weight:700;margin-top:8px}
.drawer-foot{padding:12px 20px;border-top:1px solid rgba(255,255,255,.08);font-size:11px;color:rgba(255,255,255,.4);text-align:center}
.card{background:var(--card);border-radius:16px;padding:16px;box-shadow:0 2px 10px rgba(93,41,199,.06);margin-bottom:12px}
.card h2{margin:0 0 12px;font-size:18px;font-weight:700;letter-spacing:-.01em}
.card h3{margin:0 0 8px;font-size:14px;font-weight:700}
.muted{color:var(--text-2);font-size:13px}
.stats{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:14px}
.stats.three{grid-template-columns:1fr 1fr 1fr}
.stat{background:var(--card);border-radius:16px;padding:14px;box-shadow:0 2px 10px rgba(93,41,199,.06)}
.stat .label{font-size:11px;color:var(--text-2);font-weight:600;text-transform:uppercase;letter-spacing:.04em}
.stat .value{font-size:22px;font-weight:800;margin-top:6px;letter-spacing:-.02em;line-height:1}
.stat .sub{font-size:12px;color:var(--text-2);margin-top:4px}
.stat.accent{background:linear-gradient(135deg,#5D29C7 0%,#7B3FF2 100%);color:#fff}
.stat.accent .label,.stat.accent .sub{color:rgba(255,255,255,.85)}
.stat.success{background:linear-gradient(135deg,#00B884 0%,#00D69A 100%);color:#fff}
.stat.success .label,.stat.success .sub{color:rgba(255,255,255,.85)}
.stat.danger{background:linear-gradient(135deg,#F44336 0%,#FF5E50 100%);color:#fff}
.stat.danger .label,.stat.danger .sub{color:rgba(255,255,255,.85)}
.badge{display:inline-flex;align-items:center;padding:3px 10px;border-radius:20px;font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:.04em}
.badge.success{background:var(--success-soft);color:#006B4F}
.badge.warning{background:var(--warning-soft);color:#8B4900}
.badge.danger{background:var(--danger-soft);color:#8B1A12}
.badge.info{background:var(--info-soft);color:#0D4E8A}
.badge.neutral{background:#E2E8F0;color:#475569}
.badge.primary{background:var(--primary-soft);color:var(--primary)}
.list-item{background:var(--card);border-radius:14px;padding:14px;margin-bottom:8px;cursor:pointer;box-shadow:0 1px 6px rgba(93,41,199,.05);transition:transform .1s}
.list-item:active{transform:scale(.98)}
.list-item .li-top{display:flex;justify-content:space-between;align-items:flex-start;gap:10px;margin-bottom:6px}
.list-item .li-title{font-weight:700;font-size:14px;line-height:1.3;flex:1;min-width:0;overflow:hidden;text-overflow:ellipsis}
.list-item .li-title .small{font-weight:500;color:var(--text-2);font-size:12px;display:block;margin-top:2px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.list-item .li-amount{font-weight:800;font-size:15px;white-space:nowrap;letter-spacing:-.01em}
.list-item .li-amount.positive{color:var(--success)}
.list-item .li-amount.negative{color:var(--danger)}
.list-item .li-bottom{display:flex;justify-content:space-between;align-items:center;gap:8px;margin-top:8px}
.list-item .li-meta{font-size:11px;color:var(--text-2)}
.btn{display:inline-flex;align-items:center;justify-content:center;gap:6px;padding:12px 18px;border-radius:12px;border:none;font-weight:700;font-size:14px;cursor:pointer;transition:transform .1s,opacity .15s}
.btn:active{transform:scale(.97)}
.btn:disabled{opacity:.5;cursor:not-allowed}
.btn-primary{background:linear-gradient(135deg,#5D29C7 0%,#7B3FF2 100%);color:#fff;box-shadow:0 4px 12px rgba(93,41,199,.25)}
.btn-ghost{background:#F1F5F9;color:var(--text)}
.btn-success{background:var(--success);color:#fff}
.btn-warning{background:var(--warning);color:#fff}
.btn-danger{background:var(--danger);color:#fff}
.btn-block{width:100%}
.btn-sm{padding:8px 14px;font-size:13px}
.fab{position:fixed;bottom:calc(20px + var(--safe-bot));right:16px;width:56px;height:56px;border-radius:50%;background:linear-gradient(135deg,#5D29C7 0%,#7B3FF2 100%);color:#fff;border:none;box-shadow:0 8px 24px rgba(93,41,199,.4);display:grid;place-items:center;cursor:pointer;z-index:30;transition:transform .1s}
.fab:active{transform:scale(.92)}
.field{margin-bottom:14px}
.field label{display:block;font-size:12px;font-weight:600;color:var(--text-2);margin-bottom:6px;text-transform:uppercase;letter-spacing:.04em}
.input,.select,.textarea{width:100%;padding:12px 14px;border:1.5px solid var(--border);border-radius:12px;background:#fff;font-size:15px;outline:none;transition:border-color .15s,box-shadow .15s;font-family:inherit}
.textarea{resize:vertical;min-height:80px}
.input:focus,.select:focus,.textarea:focus{border-color:var(--primary);box-shadow:0 0 0 3px rgba(93,41,199,.1)}
.field-row{display:flex;gap:10px}
.field-row .field{flex:1}
.search-bar{display:flex;align-items:center;gap:8px;background:#fff;border-radius:14px;padding:10px 14px;margin-bottom:12px;box-shadow:0 1px 6px rgba(93,41,199,.05)}
.search-bar input{flex:1;border:none;outline:none;font-size:14px;background:none}
.search-bar svg{color:var(--text-2);flex-shrink:0}
.chips{display:flex;gap:6px;overflow-x:auto;padding:4px 0 10px;scrollbar-width:none;margin:0 -14px;padding-left:14px;padding-right:14px}
.chips::-webkit-scrollbar{display:none}
.chip{padding:7px 14px;border-radius:20px;background:#fff;border:1.5px solid var(--border);font-size:12px;font-weight:600;cursor:pointer;white-space:nowrap;flex-shrink:0;color:var(--text-2);transition:all .15s}
.chip.active{background:var(--primary);border-color:var(--primary);color:#fff}
.sheet-overlay{position:fixed;inset:0;background:rgba(15,23,42,.5);z-index:100;opacity:0;pointer-events:none;transition:opacity .2s;display:flex;align-items:flex-end}
.sheet-overlay.show{opacity:1;pointer-events:auto}
.sheet{background:#fff;width:100%;max-width:720px;margin:0 auto;border-radius:20px 20px 0 0;padding:8px 16px calc(24px + var(--safe-bot));max-height:92vh;overflow-y:auto;transform:translateY(100%);transition:transform .25s cubic-bezier(.4,0,.2,1);box-shadow:0 -4px 30px rgba(30,27,75,.2)}
.sheet-overlay.show .sheet{transform:translateY(0)}
.sheet-handle{width:40px;height:4px;background:#CBD5E1;border-radius:4px;margin:4px auto 12px}
.sheet h2{margin:0 0 14px;font-size:19px;font-weight:800;letter-spacing:-.02em}
.sheet .kv{display:flex;justify-content:space-between;gap:10px;padding:8px 0;border-bottom:1px solid var(--border);font-size:14px}
.sheet .kv:last-child{border:none}
.sheet .kv .k{color:var(--text-2)}
.sheet .kv .v{font-weight:600;text-align:right}
.pin-wrap{position:fixed;inset:0;z-index:300;background:linear-gradient(160deg,#1E1B4B 0%,#5D29C7 65%,#7B3FF2 100%);color:#fff;display:flex;flex-direction:column;align-items:center;justify-content:space-between;padding:calc(40px + var(--safe-top)) 24px calc(28px + var(--safe-bot))}
.pin-head{display:flex;flex-direction:column;align-items:center;gap:14px;margin-top:10px}
.pin-head .logo{width:70px;height:70px;border-radius:20px;background:linear-gradient(135deg,#fff 0%,#EFE7FF 100%);display:grid;place-items:center;color:var(--primary);font-weight:800;font-size:30px;box-shadow:0 10px 30px rgba(0,0,0,.25)}
.pin-head h1{margin:0;font-size:22px;font-weight:800;letter-spacing:-.02em}
.pin-head .pin-sub{opacity:.75;font-size:13px;text-align:center}
.pin-dots{display:flex;gap:14px;margin:30px 0 20px}
.pin-dot{width:16px;height:16px;border-radius:50%;border:2px solid rgba(255,255,255,.6);transition:all .15s}
.pin-dot.filled{background:#fff;border-color:#fff;transform:scale(1.1)}
.pin-dot.err{background:var(--danger);border-color:var(--danger)}
.pin-shake{animation:shake .4s}
@keyframes shake{0%,100%{transform:translateX(0)}20%{transform:translateX(-10px)}40%{transform:translateX(10px)}60%{transform:translateX(-8px)}80%{transform:translateX(8px)}}
.pin-msg{min-height:22px;font-size:13px;font-weight:600;opacity:.85;text-align:center;padding:0 10px}
.pin-msg.err{color:#FFD4D0}
.pin-msg.ok{color:#C6F5E4}
.pin-pad{display:grid;grid-template-columns:repeat(3,1fr);gap:14px;max-width:300px;width:100%;margin-top:8px}
.pin-key{width:74px;height:74px;border-radius:50%;background:rgba(255,255,255,.15);color:#fff;border:none;font-size:28px;font-weight:500;cursor:pointer;display:grid;place-items:center;justify-self:center;transition:transform .1s,background .15s;font-family:inherit}
.pin-key:active{background:rgba(255,255,255,.35);transform:scale(.94)}
.pin-key.ghost{background:transparent;cursor:default}
.pin-key:disabled{opacity:.35;cursor:not-allowed}
.toast{position:fixed;left:50%;transform:translateX(-50%) translateY(200%);bottom:calc(30px + var(--safe-bot));z-index:400;background:#0F172A;color:#fff;padding:12px 20px;border-radius:14px;font-size:13px;font-weight:600;box-shadow:0 8px 24px rgba(0,0,0,.25);transition:transform .3s cubic-bezier(.4,0,.2,1);max-width:92%;text-align:center}
.toast.show{transform:translateX(-50%) translateY(0)}
.toast.success{background:var(--success)}
.toast.error{background:var(--danger)}
.hidden{display:none!important}
.empty{text-align:center;padding:40px 20px;color:var(--text-2)}
.empty .icon{font-size:40px;margin-bottom:10px;opacity:.4}
.empty .title{font-weight:700;margin-bottom:4px;color:var(--text)}
.loading{text-align:center;padding:30px;color:var(--text-2);font-size:13px}
.spinner{display:inline-block;width:20px;height:20px;border:2.5px solid var(--border);border-top-color:var(--primary);border-radius:50%;animation:spin .7s linear infinite;vertical-align:middle;margin-right:8px}
@keyframes spin{to{transform:rotate(360deg)}}
.section-title{font-size:12px;font-weight:700;color:var(--text-2);text-transform:uppercase;letter-spacing:.06em;margin:14px 4px 10px;display:flex;justify-content:space-between;align-items:center}
.section-title .link{color:var(--primary);font-weight:600;text-transform:none;letter-spacing:0;cursor:pointer;font-size:12px}
.action-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px}
.alert-card{display:flex;align-items:center;gap:12px;padding:12px 14px;border-radius:14px;margin-bottom:8px;background:var(--warning-soft)}
.alert-card.danger{background:var(--danger-soft)}
.alert-card.info{background:var(--info-soft)}
.alert-card .a-icon{font-size:20px;flex-shrink:0}
.alert-card .a-body{flex:1;min-width:0}
.alert-card .a-title{font-weight:700;font-size:13px}
.alert-card .a-sub{font-size:12px;color:var(--text-2);margin-top:2px}
.module-placeholder{padding:40px 20px;text-align:center;background:var(--card);border-radius:16px;box-shadow:0 2px 10px rgba(93,41,199,.06)}
.module-placeholder .icon{font-size:42px;margin-bottom:12px}
.module-placeholder h3{margin:0 0 6px;font-size:16px}
.module-placeholder p{font-size:13px;color:var(--text-2);margin:0 0 16px;line-height:1.5}
</style>
</head>
<body>

<!-- PIN SCREEN -->
<div id="pinScreen" class="pin-wrap">
  <div class="pin-head">
    <div class="logo">C</div>
    <h1>Ceraldi Gestionale</h1>
    <div class="pin-sub">Inserisci il PIN per continuare</div>
  </div>
  <div style="display:flex;flex-direction:column;align-items:center;width:100%">
    <div id="pinDots" class="pin-dots">
      <div class="pin-dot"></div><div class="pin-dot"></div><div class="pin-dot"></div>
      <div class="pin-dot"></div><div class="pin-dot"></div><div class="pin-dot"></div>
    </div>
    <div id="pinMsg" class="pin-msg"></div>
    <div id="pinPad" class="pin-pad">
      <button class="pin-key" data-k="1">1</button><button class="pin-key" data-k="2">2</button><button class="pin-key" data-k="3">3</button>
      <button class="pin-key" data-k="4">4</button><button class="pin-key" data-k="5">5</button><button class="pin-key" data-k="6">6</button>
      <button class="pin-key" data-k="7">7</button><button class="pin-key" data-k="8">8</button><button class="pin-key" data-k="9">9</button>
      <button class="pin-key ghost" disabled></button><button class="pin-key" data-k="0">0</button><button class="pin-key" data-k="DEL">&#9003;</button>
    </div>
  </div>
  <div style="color:rgba(255,255,255,.5);font-size:11px">v3.0 · Mobile Suite</div>
</div>

<!-- DRAWER SIDEBAR -->
<div id="drawerOverlay" class="drawer-overlay" onclick="closeDrawer()"></div>
<nav id="drawer" class="drawer">
  <div class="drawer-head">
    <div class="logo">C</div>
    <div>
      <h2>Ceraldi</h2>
      <div class="sub">Gestionale Mobile</div>
    </div>
  </div>
  <div class="drawer-nav" id="drawerNav"></div>
  <div class="drawer-foot">v3.0 · chat-8</div>
</nav>

<!-- APP -->
<div id="app" class="app hidden">
  <header class="topbar">
    <button class="menu-btn" onclick="openDrawer()">
      <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round"><line x1="3" y1="12" x2="21" y2="12"/><line x1="3" y1="6" x2="21" y2="6"/><line x1="3" y1="18" x2="21" y2="18"/></svg>
    </button>
    <div class="title-wrap">
      <div class="title" id="topTitle">Dashboard</div>
      <div class="title-sub" id="topSub">impresasemplice.online</div>
    </div>
    <div class="actions">
      <button class="icon-btn" onclick="reloadModule()"><svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><path d="M3 12a9 9 0 0 1 15.5-6.36L21 8"/><path d="M21 3v5h-5"/><path d="M21 12a9 9 0 0 1-15.5 6.36L3 16"/><path d="M3 21v-5h5"/></svg></button>
      <button class="icon-btn" onclick="lockApp()"><svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round"><rect x="3" y="11" width="18" height="11" rx="2"/><path d="M7 11V7a5 5 0 0 1 10 0v4"/></svg></button>
    </div>
  </header>
  <main id="main"><!-- contenuto iniettato --></main>
  <button id="fab" class="fab hidden" onclick="onFab()"><svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg></button>
</div>

<!-- SHEET -->
<div id="sheetOverlay" class="sheet-overlay" onclick="if(event.target===this)closeSheet()">
  <div class="sheet" onclick="event.stopPropagation()">
    <div class="sheet-handle"></div>
    <div id="sheetBody"></div>
  </div>
</div>
<div id="toast" class="toast"></div>
<script>
const PIN_HASH = '72e0837603bda6733feca2c118417d031d2df2c9574373df26c76c28a2c9c0b4';
const LS = { token:'ceraldi_mobile_token', user:'ceraldi_mobile_user', api:'ceraldi_mobile_api', attempts:'ceraldi_mobile_pin_attempts', lockUntil:'ceraldi_mobile_pin_lock' };
let API_BASE = localStorage.getItem(LS.api) || 'https://impresasemplice.online';
let TOKEN = localStorage.getItem(LS.token) || '';
let pinBuffer = '';
let currentModule = 'dashboard';
let state = {};

const $ = id => document.getElementById(id);
const euro = n => new Intl.NumberFormat('it-IT',{style:'currency',currency:'EUR'}).format(Number(n||0));
const fmtDate = d => { if(!d) return '—'; try{const s=typeof d==='string'?d.slice(0,10):d;const[Y,M,D]=s.split('-');return D&&M&&Y?`${D}/${M}/${Y}`:s}catch{return d} };
const debounce = (fn,ms=300)=>{let t;return(...a)=>{clearTimeout(t);t=setTimeout(()=>fn(...a),ms)}};
const escapeHtml = s => String(s??'').replace(/[&<>"']/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));
const haptic = (ms=10) => { if(navigator.vibrate) navigator.vibrate(ms); };
async function sha256(t){const b=await crypto.subtle.digest('SHA-256',new TextEncoder().encode(t));return Array.from(new Uint8Array(b)).map(x=>x.toString(16).padStart(2,'0')).join('');}
function toast(msg,type=''){const t=$('toast');t.textContent=msg;t.className='toast show '+type;clearTimeout(t._h);t._h=setTimeout(()=>t.className='toast'+(type?' '+type:''),2800);}

// ======== API ========
async function api(path,opts={}){
  const url = API_BASE.replace(/\/$/,'') + path;
  const headers = {'Content-Type':'application/json',...(opts.headers||{})};
  if(TOKEN) headers['Authorization'] = 'Bearer '+TOKEN;
  const res = await fetch(url,{...opts,headers});
  if(!res.ok){let msg=`HTTP ${res.status}`;try{const j=await res.json();msg=j.detail||j.message||msg;}catch{}throw new Error(msg);}
  return res.status===204?null:res.json();
}

function renderDots(){$('pinDots').querySelectorAll('.pin-dot').forEach((d,i)=>{d.classList.remove('err');d.classList.toggle('filled',i<pinBuffer.length);});}
function pinError(msg){const dots=$('pinDots');dots.classList.add('pin-shake');dots.querySelectorAll('.pin-dot').forEach(d=>d.classList.add('err'));const m=$('pinMsg');m.textContent=msg;m.className='pin-msg err';haptic([60,40,60]);setTimeout(()=>{dots.classList.remove('pin-shake');pinBuffer='';renderDots();m.textContent='';m.className='pin-msg';},900);}
function isLocked(){const u=parseInt(localStorage.getItem(LS.lockUntil)||'0');return u>Date.now()?u:0;}
function setLockTimer(){const u=isLocked();if(!u){enablePinPad(true);return;}enablePinPad(false);const s=Math.ceil((u-Date.now())/1000);$('pinMsg').innerHTML=`🔒 Bloccato · ${s}s`;$('pinMsg').className='pin-msg err';if(s>0)setTimeout(setLockTimer,1000);else{localStorage.removeItem(LS.lockUntil);localStorage.removeItem(LS.attempts);enablePinPad(true);$('pinMsg').textContent='';}}
function enablePinPad(on){$('pinPad').querySelectorAll('.pin-key').forEach(b=>{if(!b.classList.contains('ghost'))b.disabled=!on;});}
async function onPinKey(k){
  if(isLocked())return;haptic(10);
  if(k==='DEL'){pinBuffer=pinBuffer.slice(0,-1);renderDots();return;}
  if(pinBuffer.length>=6)return;
  pinBuffer+=k;renderDots();
  if(pinBuffer.length===6){
    const h = await sha256(pinBuffer);
    if(h === PIN_HASH){
      localStorage.removeItem(LS.attempts);localStorage.removeItem(LS.lockUntil);
      $('pinMsg').textContent='✓ Accesso consentito';$('pinMsg').className='pin-msg ok';haptic(20);
      setTimeout(()=>{$('pinScreen').classList.add('hidden');showApp();},250);
    }else{
      let a=parseInt(localStorage.getItem(LS.attempts)||'0')+1;localStorage.setItem(LS.attempts,String(a));
      if(a>=5){localStorage.setItem(LS.lockUntil,String(Date.now()+30000));pinError(`Troppi tentativi · 30s`);setTimeout(setLockTimer,500);}
      else pinError(`PIN errato (${a}/5)`);
    }
  }
}
document.querySelectorAll('#pinPad .pin-key').forEach(b=>{if(b.dataset.k)b.addEventListener('click',()=>onPinKey(b.dataset.k));});
document.addEventListener('keydown',e=>{if($('pinScreen').classList.contains('hidden'))return;if(/^[0-9]$/.test(e.key))onPinKey(e.key);else if(e.key==='Backspace')onPinKey('DEL');});
function showPin(){pinBuffer='';renderDots();$('pinMsg').textContent='';$('pinMsg').className='pin-msg';$('pinScreen').classList.remove('hidden');$('app').classList.add('hidden');setLockTimer();}

function goModule(id){

}

</script><script>
function getResiduo(f){if(f.residuo!=null)return f.residuo;const t=Number(f.importo_totale||f.totale||0);const p=Number(f.importo_pagato||f.pagato||0);return Math.max(0,t-p);}
function getStatoFattura(f){const r=Number(getResiduo(f));const t=Number(f.importo_totale||f.totale||0);if(r<=0.01)return{label:'Pagata',cls:'success'};if(r<t)return{label:'Parziale',cls:'warning'};if(f.data_scadenza&&new Date(f.data_scadenza)<new Date())return{label:'Scaduta',cls:'danger'};return{label:'Da pagare',cls:'info'};}
function fatturaCardHTML(f){const st=getStatoFattura(f);const sup=f.cedente_denominazione||f.supplier_name||f.fornitore_denominazione||'—';const num=f.numero_fattura||f.numero||'—';const res=getResiduo(f);const fid=f.id||f.invoice_key||f._id;return`<div class="list-item" data-fattura="${encodeURIComponent(fid)}"><div class="li-top"><div class="li-title">${escapeHtml(sup)}<span class="small">N. ${escapeHtml(num)} · ${fmtDate(f.data_fattura)}</span></div><div class="li-amount">${euro(res)}</div></div><div class="li-bottom"><span class="badge ${st.cls}">${st.label}</span><span class="li-meta">${f.data_scadenza?'Scad. '+fmtDate(f.data_scadenza):''}</span></div></div>`;}

async function render_cassa(main){

        </div></div>`;

function openAddCassa(){
  openSheet(`<h2>💰 Nuovo movimento cassa</h2>
    <div class="field-row">
      <div class="field"><label>Tipo</label><select id="cType" class="select"><option value="-1">Uscita</option><option value="1">Entrata</option></select></div>

    </div>
    <div class="field"><label>Descrizione</label><input id="cDesc" class="input" placeholder="Es. Caffè · Ricarica registratore · ..."></div>
    <div class="field"><label>Causale</label><select id="cCaus" class="select">
      <option>Spesa minuta</option><option>Acquisto merce</option><option>Rimborso</option>
      <option>Versamento da banca</option><option>Prelievo per banca</option><option>Altro</option>
    </select></div>
    <div class="field"><label>Data</label><input id="cData" class="input" type="date" value="${new Date().toISOString().slice(0,10)}"></div>
    <button class="btn btn-primary btn-block" onclick="salvaCassa()">Salva movimento</button>
    <button class="btn btn-ghost btn-block" style="margin-top:8px" onclick="closeSheet()">Annulla</button>`);
}
async function salvaCassa(){
  const imp = parseFloat($('cImp').value)||0;
  const tipo = parseInt($('cType').value);
  if(imp<=0)return toast('Importo non valido','error');
  const body = {
    importo: imp*tipo,
    descrizione: $('cDesc').value.trim(),
    causale: $('cCaus').value,
    data: $('cData').value,
    origine: 'mobile'
  };
  try{
    await api('/api/cash',{method:'POST',body:JSON.stringify(body)});
    toast('Movimento registrato','success');haptic(30);closeSheet();reloadModule();
  }catch(e){toast('Errore: '+e.message,'error');}
}
